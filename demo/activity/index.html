<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88383494" />
    <title>DTM Player - Discord Activity</title>
    <style>
        @font-face {
            font-family: 'k8x12';
            src: url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.woff2') format('woff2'),
                url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.woff') format('woff'),
                url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.ttf') format('truetype');
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --c-black: #000000;
            --c-navy: #1d2b53;
            --c-cyan: #29adff;
            --c-yellow: #ffec27;
            --c-green: #00e436;
            --c-pink: #ff77a8;
            --c-red: #ff004d;
            --c-gray: #5f574f;
            --c-muted: #83769c;
            --c-text: #fff1e8;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--c-black);
            color: var(--c-text);
            font-family: 'k8x12', ui-monospace, monospace;
            font-size: 14px;
            -webkit-font-smoothing: none;
            font-smooth: never;
            min-height: 100vh;
        }

        body {
            background-color: #000;
            background-image: radial-gradient(circle, #1a1c2c 1px, transparent 1px);
            background-size: 8px 8px;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px,
                    rgba(0, 0, 0, .22) 2px, rgba(0, 0, 0, .22) 3px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ─── Layout ─── */
        #app-wrapper {
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 12px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ─── Header ─── */
        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--c-navy);
            border: 2px solid #000;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px var(--c-cyan), 4px 4px 0 #000;
        }

        #header::before { content: '█▓▒░'; color: var(--c-cyan); font-size: 11px; }
        #header::after  { content: '░▒▓█'; color: var(--c-cyan); font-size: 11px; margin-left: auto; }

        #header-title {
            color: var(--c-cyan);
            font-size: 13px;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        #header-sub {
            color: var(--c-muted);
            font-size: 10px;
            letter-spacing: .08em;
        }

        /* ─── Status bar ─── */
        #status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: #0a0a14;
            border: 2px solid #000;
            box-shadow: 0 0 0 2px var(--c-gray), 4px 4px 0 #000;
            font-size: 10px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--c-muted);
        }

        #discord-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--c-gray);
            flex-shrink: 0;
            transition: background .3s;
        }

        #discord-dot.connected { background: var(--c-green); box-shadow: 0 0 6px var(--c-green); }
        #discord-dot.error     { background: var(--c-red);   box-shadow: 0 0 6px var(--c-red);   }

        /* ─── Panel ─── */
        .panel {
            padding: 14px 16px;
            background: var(--c-navy);
            border: 2px solid #000;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px var(--c-cyan), 4px 4px 0 #000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-label {
            color: var(--c-pink);
            font-size: 10px;
            letter-spacing: .14em;
            text-transform: uppercase;
        }

        /* ─── Input ─── */
        #hash-input {
            width: 100%;
            background: #000;
            border: 2px solid var(--c-gray);
            color: var(--c-text);
            font-family: 'k8x12', ui-monospace, monospace;
            font-size: 11px;
            padding: 8px 10px;
            letter-spacing: .04em;
            outline: none;
            resize: vertical;
            min-height: 60px;
            transition: border-color .15s;
        }

        #hash-input:focus { border-color: var(--c-cyan); }
        #hash-input::placeholder { color: var(--c-muted); }

        /* ─── Button ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            padding: 0 16px;
            border: 2px solid var(--c-cyan);
            background: #000;
            color: var(--c-cyan);
            font-family: 'k8x12', ui-monospace, monospace;
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            transition: transform .08s, box-shadow .08s;
        }

        .btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .btn:disabled {
            border-color: var(--c-gray);
            color: var(--c-gray);
            cursor: not-allowed;
        }

        /* ─── Hint text ─── */
        .hint {
            font-size: 10px;
            color: var(--c-muted);
            letter-spacing: .06em;
            line-height: 1.6;
        }

        .hint code {
            background: #000;
            padding: 1px 4px;
            color: var(--c-yellow);
            font-family: 'k8x12', ui-monospace, monospace;
        }

        /* ─── Load animation ─── */
        #boot-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--c-muted);
            font-size: 11px;
            letter-spacing: .1em;
            text-transform: uppercase;
        }

        .spin {
            color: var(--c-cyan);
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }

        /* ─── Error ─── */
        #load-error {
            display: none;
            color: var(--c-red);
            font-size: 11px;
            letter-spacing: .06em;
            line-height: 1.6;
        }

        /* ─── Player area ─── */
        #player-area { padding: 0; }

        /* ─── Credit ─── */
        #credit {
            text-align: right;
            font-size: 10px;
            letter-spacing: .08em;
            color: var(--c-gray);
            text-transform: uppercase;
            padding: 4px 0;
        }

        #credit a { color: var(--c-gray); text-decoration: none; }
        #credit a:hover { color: var(--c-cyan); }
    </style>
</head>

<body>
    <div id="app-wrapper">

        <!-- Header -->
        <div id="header">
            <div>
                <div id="header-title">DTM Player</div>
                <div id="header-sub">Discord Activity · @onjmin/dtm</div>
            </div>
        </div>

        <!-- Discord Status Bar -->
        <div id="status-bar">
            <div id="discord-dot"></div>
            <span id="status-text">CONNECTING TO DISCORD…</span>
        </div>

        <!-- Paste input panel -->
        <div class="panel" id="input-panel">
            <div class="panel-label">► LOAD SONG</div>

            <div id="boot-msg">
                <span class="spin">█</span>
                <span>INITIALIZING PLAYER…</span>
            </div>

            <div id="load-error"></div>

            <textarea
                id="hash-input"
                placeholder="DTMエディタの「Discordで共有」でコピーしたコードをここに貼り付けてください…"
                autocomplete="off"
                spellcheck="false"
                style="display:none"
            ></textarea>

            <button id="load-btn" class="btn" style="display:none" disabled>
                ▶ PLAY
            </button>

            <div class="hint" id="hint-text" style="display:none">
                DTMエディタ（<code>demo/index.html</code>）の
                <code>🎮 DISCORD</code> ボタンを押してコードをコピーし、上の欄に貼り付けてください。
            </div>
        </div>

        <!-- Player mount point -->
        <div id="player-area"></div>

        <!-- Credit -->
        <div id="credit">
            <a href="https://github.com/onjmin/dtm" target="_blank" rel="noopener">♪ @onjmin/dtm</a>
        </div>

    </div>

    <!--
      Import Map: rpgen3.github.io への動的 import() を Discord プロキシ経由にリダイレクト
      Developer Portal の URL Mappings: /sf → rpgen3.github.io が必要
    -->
    <script type="importmap">
    {
      "imports": {
        "https://rpgen3.github.io/":   "/.proxy/sf/",
        "https://surikov.github.io/":  "/.proxy/surikov/"
      }
    }
    </script>

    <!-- External module script (CSP compliant: no inline JS) -->
    <script type="module" src="./player.js?v=__CI_HASH__"></script>
</body>

</html>
