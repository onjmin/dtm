<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88383494" />
    <title>DTM Collab - Discord Activity</title>
    <style>
        @font-face {
            font-family: 'k8x12';
            src: url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.woff2') format('woff2'),
                url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.woff') format('woff'),
                url('/.proxy/fonts/t/777630d46640dc5a928ea833c2fcb875.ttf') format('truetype');
        }

        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --c-black: #000000;
            --c-navy: #1d2b53;
            --c-cyan: #29adff;
            --c-yellow: #ffec27;
            --c-green: #00e436;
            --c-pink: #ff77a8;
            --c-red: #ff004d;
            --c-gray: #5f574f;
            --c-muted: #83769c;
            --c-text: #fff1e8;
        }

        html, body {
            margin: 0; padding: 0;
            background: var(--c-black);
            color: var(--c-text);
            font-family: 'k8x12', ui-monospace, monospace;
            font-size: 14px;
            -webkit-font-smoothing: none;
            font-smooth: never;
            min-height: 100vh;
        }

        body {
            background-color: #000;
            background-image: radial-gradient(circle, #1a1c2c 1px, transparent 1px);
            background-size: 8px 8px;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px,
                rgba(0,0,0,.22) 2px, rgba(0,0,0,.22) 3px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ─── Layout ─── */
        #app-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 10px 8px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ─── Header ─── */
        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            background: var(--c-navy);
            border: 2px solid #000;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px var(--c-cyan), 4px 4px 0 #000;
        }
        #header::before { content: '█▓▒░'; color: var(--c-cyan); font-size: 11px; }
        #header::after  { content: '░▒▓█'; color: var(--c-cyan); font-size: 11px; margin-left: auto; }
        #header-title { color: var(--c-cyan); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
        #header-sub   { color: var(--c-muted); font-size: 10px; letter-spacing: .08em; }

        /* ─── Status bar ─── */
        #status-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 10px;
            background: #0a0a14;
            border: 2px solid #000;
            box-shadow: 0 0 0 2px var(--c-gray), 4px 4px 0 #000;
            font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--c-muted);
        }
        #discord-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--c-gray); flex-shrink: 0; transition: background .3s;
        }
        #discord-dot.connected { background: var(--c-green); box-shadow: 0 0 6px var(--c-green); }
        #discord-dot.error     { background: var(--c-red);   box-shadow: 0 0 6px var(--c-red);   }
        #relay-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--c-gray); flex-shrink: 0; transition: background .3s;
        }
        #relay-dot.connected { background: var(--c-green); box-shadow: 0 0 6px var(--c-green); }
        #relay-dot.error     { background: var(--c-red);   box-shadow: 0 0 6px var(--c-red);   }

        /* ─── Players panel ─── */
        #players-panel {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 8px 10px;
            background: var(--c-navy);
            border: 2px solid #000;
            box-shadow: inset 0 0 0 2px #000, 0 0 0 2px var(--c-cyan), 4px 4px 0 #000;
        }
        #players-label {
            width: 100%;
            color: var(--c-pink);
            font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
            margin-bottom: 2px;
        }
        .player-card {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; letter-spacing: .06em;
        }
        .player-card.is-me .player-id { color: var(--c-cyan); }
        .player-id { color: var(--c-text); }
        .player-track { color: var(--c-muted); }
        .mute-btn {
            background: none; border: none; cursor: pointer;
            color: var(--c-text); font-size: 12px; padding: 0 1px;
            line-height: 1; transition: opacity .15s;
        }
        .mute-btn.muted { opacity: .4; }

        /* ─── Off-screen indicator ─── */
        .offscreen-arrow {
            position: fixed; z-index: 100;
            background: rgba(0,0,0,.8);
            border: 2px solid;
            color: #fff;
            font-size: 10px; letter-spacing: .06em;
            padding: 3px 7px;
            pointer-events: all;
            cursor: pointer;
            display: none;
        }
        .offscreen-arrow.left  { left: 4px; top: 50%; transform: translateY(-50%); }
        .offscreen-arrow.right { right: 4px; top: 50%; transform: translateY(-50%); }

        /* ─── DAW area ─── */
        #daw-area { min-height: 400px; }

        /* マクロは非表示 */
        [data-dtm="macro-clear"],
        [data-dtm="macro-random"],
        [data-dtm="macro-harmonic"],
        [data-dtm="macro-mono"] { display: none !important; }

        /* ─── Boot / error ─── */
        #boot-msg {
            display: flex; align-items: center; gap: 8px;
            color: var(--c-muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
            padding: 32px 16px;
        }
        .spin { color: var(--c-cyan); animation: blink 1s steps(1) infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        #load-error {
            display: none; color: var(--c-red);
            font-size: 11px; letter-spacing: .06em; line-height: 1.6; padding: 8px 16px;
        }

        /* ─── Credit ─── */
        #credit {
            text-align: right; font-size: 10px; letter-spacing: .08em;
            color: var(--c-gray); text-transform: uppercase; padding: 2px 0;
        }
        #credit a { color: var(--c-gray); text-decoration: none; }
        #credit a:hover { color: var(--c-cyan); }
    </style>
</head>

<body>
    <div id="app-wrapper">

        <!-- Header -->
        <div id="header">
            <div>
                <div id="header-title">DTM Collab</div>
                <div id="header-sub">協力DAW · Discord Activity · @onjmin/dtm</div>
            </div>
        </div>

        <!-- Status bar -->
        <div id="status-bar">
            <div id="discord-dot"></div>
            <span id="discord-status">CONNECTING TO DISCORD…</span>
            <span style="margin:0 4px;color:#333">|</span>
            <div id="relay-dot"></div>
            <span id="relay-status">RELAY DISCONNECTED</span>
        </div>

        <!-- Players panel -->
        <div id="players-panel">
            <div id="players-label">► PLAYERS</div>
            <div id="players-list"><!-- JS で動的生成 --></div>
        </div>

        <!-- Off-screen edit indicators -->
        <div class="offscreen-arrow left"  id="arrow-left"></div>
        <div class="offscreen-arrow right" id="arrow-right"></div>

        <!-- Boot / error -->
        <div id="boot-msg">
            <span class="spin">█</span>
            <span>INITIALIZING…</span>
        </div>
        <div id="load-error"></div>

        <!-- DAW mount point -->
        <div id="daw-area"></div>

        <!-- Credit -->
        <div id="credit">
            <a href="https://github.com/onjmin/dtm" target="_blank" rel="noopener">♪ @onjmin/dtm</a>
        </div>

    </div>

    <script type="importmap">
    {
      "imports": {
        "https://surikov.github.io/":  "/.proxy/surikov/"
      }
    }
    </script>

    <script type="module" src="./collab.js?v=be0cfb35"></script>
</body>

</html>
