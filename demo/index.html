<!DOCTYPE html>
<html lang="ja" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88383494" />
    <title>DTM Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'MisakiGothic';
            src: url('https://cdn.jsdelivr.net/npm/misaki-font/misaki_gothic.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/npm/misaki-font/misaki_gothic.woff') format('woff');
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'MisakiGothic', 'MS Gothic', ui-monospace, monospace;
            background: #0d0d1a;
            color: #f4f4f4;
            margin: 0;
            min-height: 100vh;
            /* ドット格子背景 */
            background-image: radial-gradient(circle, #2a2d4a 1px, transparent 1px);
            background-size: 16px 16px;
        }
        /* スキャンライン */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 3px
            );
            pointer-events: none;
            z-index: 9999;
        }
        /* スクロールバー */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1c2c; }
        ::-webkit-scrollbar-thumb { background: #29adff; border-radius: 0; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        pixel: ['MisakiGothic', 'MS Gothic', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        pico: {
                            bg:      '#1a1c2c',
                            surface: '#16213e',
                            dark:    '#0f0f23',
                            border:  '#3d405b',
                            cyan:    '#29adff',
                            green:   '#00e436',
                            red:     '#ff004d',
                            pink:    '#ff77a8',
                            orange:  '#ffa300',
                            yellow:  '#ffec27',
                            gray:    '#7e7e8a',
                            white:   '#f4f4f4',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-pixel">

    <!-- ヘッダー -->
    <header class="border-b-4 border-pico-cyan bg-pico-dark px-4 py-3 shadow-[0_4px_0_#000]">
        <div class="max-w-4xl mx-auto flex items-center gap-3">
            <div class="w-8 h-8 bg-pico-green flex items-center justify-center text-black text-lg shadow-[2px_2px_0_#000] shrink-0">
                ♪
            </div>
            <div>
                <h1 class="text-pico-cyan text-base tracking-widest m-0 leading-tight">
                    [ @onjmin/dtm ]
                </h1>
                <p class="text-pico-gray text-xs m-0 mt-0.5 tracking-wide">
                    &gt; mountDAW() — mobile-first DAW component
                </p>
            </div>
            <div class="ml-auto flex items-center gap-2">
                <span class="text-pico-green text-xs animate-pulse tracking-widest">● ONLINE</span>
            </div>
        </div>
    </header>

    <!-- 楽器プリセットバー -->
    <div class="max-w-4xl mx-auto px-3 py-2">
        <div class="flex flex-wrap items-center gap-3 border-2 border-pico-border bg-pico-dark px-3 py-2 shadow-[3px_3px_0_#000]">
            <span class="text-pico-gray text-xs tracking-widest shrink-0">INSTRUMENT</span>
            <select id="preset"
                class="min-h-[36px] px-2 border-2 border-pico-border bg-pico-surface text-pico-white font-pixel text-xs
                       shadow-[inset_1px_1px_0_#000] focus:outline-none focus:border-pico-cyan grow">
            </select>
            <span id="loading"
                class="text-pico-orange text-xs tracking-widest animate-pulse shrink-0">
                LOADING…
            </span>
        </div>
    </div>

    <!-- DAW マウント領域 -->
    <div id="app" class="max-w-4xl mx-auto px-3 pb-6"></div>

    <script type="module">
        import { parseChord } from 'https://rpgen3.github.io/piano/mjs/parseChord.mjs';
        import { parseChords } from 'https://rpgen3.github.io/piano/mjs/parseChords.mjs';
        import { SoundFont } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont.mjs';
        import { SoundFont_drum } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont_drum.mjs';
        import { SoundFont_list } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont_list.mjs';

        const DTM = await import(location.hostname === 'localhost'
            ? 'http://localhost:40298/dist/index.mjs'
            : './index.mjs');

        const { createAudioContext, setupRecorder, buildNameToKeyMapping } = DTM;
        const { DRUM_KEYS, DRUM_FONT } = DTM;
        const { INSTRUMENT_PRESETS } = DTM;

        // --- オーディオ基盤（利用側が用意する） ---
        const { audioCtx, gainNode, drumGainNode } = createAudioContext();
        gainNode.gain.value = 1;
        drumGainNode.gain.value = 1;
        const recorder = setupRecorder(audioCtx, gainNode, drumGainNode);

        const soundFonts = {};
        const currentFont = 'FluidR3_GM_sf2_file';
        let nameToKey = {};

        const loadDrum = async () => {
            try {
                await SoundFont_drum.load({ ctx: audioCtx, font: DRUM_FONT, id: '0', keys: Object.values(DRUM_KEYS) });
            } catch (e) { console.error('drum load failed', e); }
        };

        const loadSoundFont = async (instrumentKey, trackId) => {
            try {
                const fullName = `${instrumentKey}_${currentFont}`;
                soundFonts[trackId] = await SoundFont.load({
                    ctx: audioCtx,
                    fontName: `_tone_${fullName}`,
                    url: SoundFont.toURL(fullName),
                });
            } catch (e) { console.error(`load ${instrumentKey} failed`, e); }
        };

        const loadPreset = async (presetKey) => {
            const preset = INSTRUMENT_PRESETS[presetKey];
            if (!preset) return;
            document.getElementById('loading').style.display = '';
            const trackIds = ['melody', 'submelody', 'bass', 'chord'];
            await Promise.all(trackIds.map((trackId) => {
                const key = nameToKey[preset[trackId]];
                return key ? loadSoundFont(key, trackId) : Promise.resolve();
            }));
            document.getElementById('loading').style.display = 'none';
        };

        // --- 録音 WAV 書き出し ---
        const downloadWav = (recordedData) => {
            const mergeData = () => {
                const ch = recordedData.length;
                const len = recordedData[0].length;
                if (len === 0) return new Float32Array(0);
                const bufSize = recordedData[0][0].length;
                const wave = new Float32Array(ch * len * bufSize);
                let idx = 0;
                for (let i = 0; i < len; i++)
                    for (let j = 0; j < bufSize; j++)
                        for (let k = 0; k < ch; k++) wave[idx++] = recordedData[k][i][j];
                return wave;
            };
            const wave = mergeData();
            const sampleRate = audioCtx.sampleRate, channels = 2, bitRate = 16;
            const step = bitRate / 8, blockSize = channels * step, len = wave.length * step;
            const view = new DataView(new ArrayBuffer(44 + len));
            const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
            writeStr(0, 'RIFF'); view.setUint32(4, 32 + len, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, channels, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * blockSize, true);
            view.setUint16(32, blockSize, true); view.setUint16(34, bitRate, true);
            writeStr(36, 'data'); view.setUint32(40, len, true);
            const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
            let off = 44;
            for (let i = 0; i < wave.length; i++, off += step)
                view.setInt16(off, clamp(Math.round(wave[i] * 0x8000), -0x8000, 0x7fff), true);
            const blob = new Blob([view], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'record.wav'; a.click();
            URL.revokeObjectURL(url);
        };

        // --- MIDIバイナリ解析（midi-parser-js を動的読込） ---
        const parseMidi = (() => {
            let MidiParser = null;
            import('https://cdn.jsdelivr.net/npm/midi-parser-js@4.0.4/+esm')
                .then((m) => { MidiParser = m.default ?? m; })
                .catch((e) => console.error('midi-parser load failed', e));
            return (bytes) => {
                if (!MidiParser) throw new Error('midi-parser not ready');
                return MidiParser.parse(bytes);
            };
        })();

        // --- DAWマウント ---
        const daw = DTM.mountDAW(document.getElementById('app'), {
            getAudioTime: () => audioCtx.currentTime,
            onResumeAudio: () => { if (audioCtx.state === 'suspended') audioCtx.resume(); },
            onPlayNote: ({ trackId, pitch, volume, when, duration }) => {
                const sf = soundFonts[trackId];
                if (!sf) return;
                sf.play({ ctx: audioCtx, destination: gainNode, pitch, volume, when, duration });
            },
            onPlayDrum: ({ pitch, velocity, when, duration }) => {
                if (!SoundFont_drum.font) return;
                SoundFont_drum.play({ ctx: audioCtx, pitch, volume: velocity, when, duration, destination: drumGainNode });
            },
            onToggleRecord: () => {
                if (recorder.isRecording()) {
                    recorder.stopRecording();
                    downloadWav(recorder.getRecordedData());
                } else {
                    recorder.clearRecordedData();
                    recorder.startRecording();
                }
            },
            parseChord,
            parseChords,
            parseMidi,
            defaultBpm: 120,
        });
        window.daw = daw;

        // --- 楽器プリセットUI（デモ側のクローム） ---
        const presetSelect = document.getElementById('preset');
        for (const [key, preset] of Object.entries(INSTRUMENT_PRESETS)) {
            const opt = document.createElement('option');
            opt.value = key; opt.textContent = preset.displayName;
            presetSelect.appendChild(opt);
        }
        const defaultPreset = 'retro_game';
        presetSelect.value = defaultPreset;
        presetSelect.addEventListener('change', () => loadPreset(presetSelect.value));

        loadDrum();
        SoundFont_list.init();
        SoundFont_list.onload(async () => {
            nameToKey = await buildNameToKeyMapping();
            await loadPreset(defaultPreset);
        });
    </script>
</body>

</html>
