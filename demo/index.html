        // 和音自動入力機能
        window.applyChordProgression = (chordStr) => {
            if (!chordStr.trim()) return;

            const chordTrack = tracks.find(t => t.id === 'chord');
            if (!chordTrack?.core) return;

            const patternType = document.getElementById('chord-pattern-select')?.value || 'block';
            const rootShift = parseInt(document.getElementById('chord-root-select')?.value) || 0;

            // 伴奏トラックをクリア
            chordTrack.core.clearNotesWithoutHistory();
            chordTrack.core.beginBatch();

            const bpm = parseInt(document.getElementById('bpm-input')?.value) || 120;
            const stepsPerBar = renderConfig.stepsPerBar;
            const chordLength = stepsPerBar;

            const c3 = 48;
            const offset = rootShift;

            // コード進行をパース
            let chordData;
            try {
                chordData = parseChords(chordStr, bpm);
            } catch (e) {
                console.warn('Failed to parse chords:', e);
                chordData = [];
            }

            if (chordData.length > 0) {
                const secondsPerBar = 60 / bpm * 4;
                const secondsPerStep = secondsPerBar / stepsPerBar;

                // 同じタイミングのコードをグループ化
                const chordGroups = {};
                chordData.forEach((chord) => {
                    const whenStep = Math.floor(chord.when / secondsPerStep);
                    const durationSteps = Math.floor(chord.duration / secondsPerStep);
                    if (!chordGroups[whenStep]) {
                        chordGroups[whenStep] = [];
                    }
                    chordGroups[whenStep].push({ ...chord, whenStep, durationSteps });
                });

                Object.values(chordGroups).forEach((group) => {
                    group.forEach((chord, idx) => {
                        try {
                            const parsed = parseChord(`${chord.key}${chord.chord}`);
                            const notes = [...parsed.value];

                            // コードの持続時間を使用
                            let noteLength = chord.durationSteps;

                            if (patternType === 'block') {
                                // ブロック: 全ての音を同時に鳴らし、durationそのまま
                                notes.forEach((noteOffset, i) => {
                                    const pitch = c3 + noteOffset + offset;
                                    chordTrack.core.addNote(chord.whenStep, pitch, {
                                        noteLengthSteps: noteLength,
                                        velocity: 100,
                                    });
                                });
                            } else if (patternType === 'arpeggio') {
                                // アルペジオ: リズムグリッドに沿って配置
                                const arpInterval = Math.floor(noteLength / notes.length);
                                notes.forEach((noteOffset, i) => {
                                    const pitch = c3 + noteOffset + offset;
                                    chordTrack.core.addNote(chord.whenStep + i * arpInterval, pitch, {
                                        noteLengthSteps: noteLength - i * arpInterval,
                                        velocity: 100,
                                    });
                                });
                            } else if (patternType === 'arpeggio-fast') {
                                // アルペジオ（ジャラーン）: 各音を数ステップずつ続けて配置
                                const arpInterval = 6; // 短間隔でずらす
                                notes.forEach((noteOffset, i) => {
                                    const pitch = c3 + noteOffset + offset;
                                    chordTrack.core.addNote(chord.whenStep + i * arpInterval, pitch, {
                                        noteLengthSteps: Math.max(12, noteLength - i * arpInterval),
                                        velocity: 100,
                                    });
                                });
                            } else if (patternType === 'offbeat') {
                                // 裏打ち: コードの構成音全てを揃えて、拍の裏（8分裏）に配置
                                const stepsPerQuarter = Math.floor(stepsPerBar / 4);
                                const halfBeat = Math.floor(stepsPerQuarter / 2); // 8分音符分（裏）

                                for (let beat = 0; beat < 4; beat++) {
                                    const syncopatedStep = chord.whenStep + (beat * stepsPerQuarter) + halfBeat;

                                    // コードの長さ（noteLength）を超えない範囲でノートを置く
                                    if (syncopatedStep < chord.whenStep + noteLength) {
                                        notes.forEach((noteOffset) => {
                                            const pitch = c3 + noteOffset + offset;
                                            chordTrack.core.addNote(syncopatedStep, pitch, {
                                                // 裏打ちは短く切る（スタッカート気味）のが一般的
                                                noteLengthSteps: Math.min(halfBeat, 12),
                                                velocity: 100,
                                            });
                                        });
                                    }
                                }
                            } else if (patternType === 'alternating') {
                                // 交互奏: 低音と高音交互
                                notes.forEach((noteOffset, i) => {
                                    const pitch = c3 + noteOffset + offset;
                                    const stepOffset = i * Math.floor(stepsPerBar / 4);
                                    chordTrack.core.addNote(chord.whenStep + stepOffset, pitch, {
                                        noteLengthSteps: Math.max(12, Math.floor(stepsPerBar / 4)),
                                        velocity: 100,
                                    });
                                });
                            }
                        } catch (e) {
                            console.warn(`Invalid chord: ${chord.key}${chord.chord}`, e);
                        }
                    });
                });
            } else {
                // フォールバック: カンマ or スペース区切り
                const chordNames = chordStr.split(/[\s,]+/).filter(c => c);
                chordNames.forEach((chordName, barIndex) => {
                    try {
                        const chordData = parseChord(chordName);
                        const notes = [...chordData.value];

                        if (notes.length > 0) {
                            const startStep = barIndex * chordLength;

                            notes.forEach((noteOffset, i) => {
                                const pitch = c3 + noteOffset + offset;
                                const stepOffset = i * 2;
                                chordTrack.core.addNote(startStep + stepOffset, pitch, {
                                    noteLengthSteps: chordLength - stepOffset,
                                    velocity: 100,
                                });
                            });
                        }
                    } catch (e) {
                        console.warn(`Invalid chord: ${chordName}`, e);
                    }
                });
            }

            chordTrack.core.endBatch();
            chordTrack.core.addHistoryOnce();
            redrawAll();
        };

        const setLoadMode = (mode) => {
            tracks.forEach(track => {
                if (track.core) track.core.setLoadMode(mode);

        };

        let pendingMidiData = null;
        let detectedTracks = [];
        let lastLoadedMidiFileName = null;

        const midiFileInput = document.getElementById('midi-file-input');
        midiFileInput.addEventListener('change', async (e) => {

            // 新しいファイルが選択されたらボタンをプライマリー（緑）に戻す

            loadButton.classList.add('bg-green-500', 'hover:bg-green-600');

            document.getElementById('midi-loading-overlay').classList.remove('hidden');

            const arrayBuffer = await file.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);
            pendingMidiData = MidiParser.parse(uint8Array);

            document.getElementById('midi-loading-overlay').classList.add('hidden');

            const trackSelectionDiv = document.getElementById('midi-track-selection');
            trackSelectionDiv.innerHTML = '<span class="text-sm text-gray-600">トラック:</span>';
            detectedTracks = analyzeMidiTracks(pendingMidiData);

            detectedTracks.forEach((t, i) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.id = `midi-track-btn-${i}`;
                btn.className = t.selected
                    ? 'px-2 py-1 bg-blue-500 text-white rounded text-xs flex items-center space-x-1'
                    : 'px-2 py-1 bg-gray-200 text-gray-700 rounded text-xs flex items-center space-x-1';
                btn.innerHTML = `
                    <input type="checkbox" ${t.selected ? 'checked' : ''} class="pointer-events-none">
                    <span>${t.name} (${t.noteCount})</span>
                `;
                btn.onclick = () => {
                    const checkbox = btn.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                    btn.className = checkbox.checked
                        ? 'px-2 py-1 bg-blue-500 text-white rounded text-xs flex items-center space-x-1'
                        : 'px-2 py-1 bg-gray-200 text-gray-700 rounded text-xs flex items-center space-x-1';
                };
                trackSelectionDiv.appendChild(btn);
            });

            trackSelectionDiv.classList.remove('hidden');
            loadButton.classList.remove('hidden');
            document.getElementById('midi-load-note').classList.remove('hidden');
        });

        const analyzeMidiTracks = (midi) => {
            const { track } = midi;
            const trackAnalysis = [];

            for (let i = 0; i < track.length; i++) {
                const trackData = track[i];
                const notes = [];
                let currentTime = 0;
                for (const event of trackData.event) {
                    currentTime += event.deltaTime;
                    if (event.type === 9 && event.data && event.data[1]) {
                        notes.push({ pitch: event.data[0], velocity: event.data[1], start: currentTime });
                    } else if (event.type === 8) {
                        for (let j = notes.length - 1; j >= 0; j--) {
                            if (notes[j].pitch === event.data[0] && !notes[j].end) {
                                notes[j].end = currentTime;
                                break;
                            }
                        }
                    }
                }
                const validNotes = notes.filter(n => n.end);
                trackAnalysis.push({
                    index: i,
                    name: `Ch${i}`,
                    noteCount: validNotes.length,
                    selected: validNotes.length > 0
                });
            }

            return trackAnalysis;
        };

        window.loadMidiFromSelection = () => {
            if (!pendingMidiData) return;

            const selectedIndices = [];
            detectedTracks.forEach((t, i) => {
                const btn = document.getElementById(`midi-track-btn-${i}`);
                if (btn) {
                    const checkbox = btn.querySelector('input');
                    if (checkbox && checkbox.checked) {
                        selectedIndices.push(t.index);
                    }
                }
            });

            if (selectedIndices.length === 0) {
                alert('少なくとも1つのトラックを選択してください');
                return;
            }

            // 読み込むファイルの名前を記憶し、ボタンを無効化
            const fileInput = document.getElementById('midi-file-input');
            const fileName = fileInput.files[0]?.name || '';
            lastLoadedMidiFileName = fileName;

            const loadButton = document.getElementById('midi-load-button');
            loadButton.classList.remove('bg-green-500', 'hover:bg-green-600');
            loadButton.classList.add('bg-yellow-500', 'hover:bg-yellow-600');

            document.getElementById('midi-loading-overlay').classList.remove('hidden');

            setTimeout(() => {
                clearAllNotes();
                setLoadMode(true);

                parseMidiWithSelection(pendingMidiData, selectedIndices);

                setLoadMode(false);
                tracks.forEach(track => {
                    if (track.core) track.core.addHistoryOnce();
                });
                updateUndoRedoButtons();

                document.getElementById('midi-loading-overlay').classList.add('hidden');
            }, 50);
        };

        const getBPM = (midi) => {
            const { track } = midi;
            for (const { event } of track) {
                for (const { type, metaType, data } of event) {
                    if (type !== 0xFF || metaType !== 0x51) continue;
                    if (typeof data === 'number') {
                        return 60000000 / data;
                    }
                    const [b1, b2, b3] = data;
                    return 60000000 / ((b1 << 16) | (b2 << 8) | b3);
                }
            }
            return 120;
        };

        const parseMidiWithSelection = (midi, selectedTrackIndices) => {
            const { track, timeDivision } = midi;
            const ticksPerBeat = timeDivision;
            const stepsPerBeat = 48;

            const bpm = getBPM(midi);
            document.getElementById('bpm-input').value = Math.round(bpm);
            const updateTempo = () => {
                const bpmVal = parseInt(document.getElementById('bpm-input').value) || 120;
                tracks.forEach(track => {
                    if (track.core) track.core.setTempo(bpmVal);
                });
            };
            updateTempo();

            const channelNotes = {};
            selectedTrackIndices.forEach(trackIdx => {
                const trackData = track[trackIdx];
                if (!trackData) return;
                let currentTime = 0;
                for (const event of trackData.event) {
                    currentTime += event.deltaTime;
                    if (event.channel === 9) continue;
                    if (event.type !== 8 && event.type !== 9) continue;
                    const [pitch, velocity] = event.data;
                    const isNoteOFF = event.type === 8 || !velocity;
                    const channel = event.channel;

                    if (!channelNotes[channel]) channelNotes[channel] = [];

                    if (isNoteOFF) {
                        for (let i = channelNotes[channel].length - 1; i >= 0; i--) {
                            const note = channelNotes[channel][i];
                            if (note.pitch === pitch && note.end === null) {
                                note.end = currentTime;
                                break;
                            }
                        }
                    } else {
                        channelNotes[channel].push({ pitch, velocity, start: currentTime, end: null });
                    }
                }
            });

            // 各チャンネルの特性を分析
            const channelAnalysis = {};
            const ticksPerBar = ticksPerBeat * 4; // 4 beats per bar
            const ticksPer8Bars = ticksPerBar * 8;

            for (const [channelStr, notes] of Object.entries(channelNotes)) {
                const channel = parseInt(channelStr);
                const validNotes = notes.filter(n => n.end !== null);

                // 平均ピッチを計算
                const avgPitch = validNotes.reduce((sum, n) => sum + n.pitch, 0) / validNotes.length;

                // 同時発音数をチェック（メロディアン: 1つ以下）
                let maxSimultaneous = 0;
                const sortedNotes = [...validNotes].sort((a, b) => a.start - b.start);
                for (let i = 0; i < sortedNotes.length; i++) {
                    let simultaneous = 1;
                    for (let j = i + 1; j < sortedNotes.length; j++) {
                        if (sortedNotes[j].start < sortedNotes[i].end) {
                            simultaneous++;
                        }
                    }
                    maxSimultaneous = Math.max(maxSimultaneous, simultaneous);
                }

                // 休憩（1小節以上の隙間）でブロック分割。各ブロックが8小節未満かチェック
                const isSubmelodyPattern = (sortedNotes) => {
                    if (sortedNotes.length === 0) return false;
                    const blocks = [];
                    let currentBlockStart = sortedNotes[0].start;
                    let currentBlockEnd = sortedNotes[0].end;

                    for (let i = 1; i < sortedNotes.length; i++) {
                        const gapTicks = sortedNotes[i].start - sortedNotes[i - 1].end;
                        if (gapTicks >= ticksPerBar) {
                            // 休憩でブロック分割
                            blocks.push({ start: currentBlockStart, end: currentBlockEnd });
                            currentBlockStart = sortedNotes[i].start;
                            currentBlockEnd = sortedNotes[i].end;
                        } else {
                            currentBlockEnd = sortedNotes[i].end;
                        }
                    }
                    blocks.push({ start: currentBlockStart, end: currentBlockEnd });

                    // 全ブロックが8小節未満
                    return blocks.every(block => (block.end - block.start) < ticksPer8Bars);
                };

                const hasSubmelodyPattern = isSubmelodyPattern(sortedNotes);

                channelAnalysis[channel] = {
                    avgPitch,
                    maxSimultaneous,
                    noteCount: validNotes.length,
                    hasSubmelodyPattern
                };
            }

            // ピッチ順にソート
            const channels = Object.keys(channelNotes).map(Number).sort((a, b) => a - b);
            const sortedByPitch = [...channels].sort((a, b) =>
                channelAnalysis[a].avgPitch - channelAnalysis[b].avgPitch
            );

            // 平均ピッチが低く、同時発音が少ない → ベース候補
            const bassThreshold = sortedByPitch[Math.floor(sortedByPitch.length / 4)]?.avgPitch || 60;
            const bassChannels = channels.filter(ch =>
                channelAnalysis[ch].avgPitch <= bassThreshold &&
                channelAnalysis[ch].maxSimultaneous <= 2
            );

            // メロディ系（同時発音1つ以下、ベース以外）
            const melodyTypeChannels = channels.filter(ch =>
                channelAnalysis[ch].maxSimultaneous <= 1 &&
                !bassChannels.includes(ch)
            );

            // 休憩で分割した各ブロックが8小節未満 → サブメロ候補、残りはメロディ
            const submelodyChannels = melodyTypeChannels.filter(ch =>
                channelAnalysis[ch].hasSubmelodyPattern
            );
            const melodyChannels = melodyTypeChannels.filter(ch =>
                !channelAnalysis[ch].hasSubmelodyPattern
            );

            // 残りはコード（伴奏）
            const chordChannels = channels.filter(ch =>
                !bassChannels.includes(ch) &&
                !melodyChannels.includes(ch) &&
                !submelodyChannels.includes(ch)
            );

            const channelToTrackMap = {
                melody: melodyChannels,
                submelody: submelodyChannels,
                bass: bassChannels,
                chord: chordChannels
            };

            console.log('チャンネル分析:');
            for (const [ch, analysis] of Object.entries(channelAnalysis)) {
                console.log(`  ch${ch}: 平均pitch=${analysis.avgPitch.toFixed(1)}, 最大同時発音=${analysis.maxSimultaneous}, ノート数=${analysis.noteCount}, サブメロ=${analysis.hasSubmelodyPattern}`);
            }
            console.log('トラック割り当て:');
            console.log('  melody:', melodyChannels);
            console.log('  submelody:', submelodyChannels);
            console.log('  bass:', bassChannels);
            console.log('  chord:', chordChannels);

            let placedCount = 0;
            let totalNotes = 0;
            const trackNotes = { melody: 0, submelody: 0, bass: 0, chord: 0 };

            for (const [channelStr, notes] of Object.entries(channelNotes)) {
                const channel = parseInt(channelStr);
                totalNotes += notes.filter(n => n.end !== null).length;

                let trackId = null;
                for (const [tid, chs] of Object.entries(channelToTrackMap)) {
                    if (chs.includes(channel)) {
                        trackId = tid;
                        break;
                    }
                }
                if (!trackId) continue;

                const targetTrack = tracks.find(t => t.id === trackId);
                if (!targetTrack || !targetTrack.core) continue;

                for (const note of notes) {
                    if (note.end === null) continue;
                    const ticksPerStep = ticksPerBeat / stepsPerBeat;
                    const startStep = Math.round(note.start / ticksPerStep);
                    const durationTicks = note.end - note.start;
                    const durationSteps = Math.max(1, Math.round(durationTicks / ticksPerStep));

                    targetTrack.core.addNote(startStep, note.pitch, { noteLengthSteps: durationSteps, velocity: note.velocity });
                    placedCount++;
                    trackNotes[trackId]++;
                }
            }

            console.log('MIDI読み込み結果:');
            console.log('  トラック数:', Object.keys(track).length);
            console.log('  チャンネル数:', Object.keys(channelNotes).length);
            for (const [ch, notes] of Object.entries(channelNotes)) {
                const validNotes = notes.filter(n => n.end !== null).length;
                console.log(`  ch${ch}: ${validNotes}/${notes.length}ノート`);
            }
            console.log('  総ノート数:', totalNotes);
            console.log('  配置したノート数:', placedCount);
            console.log('  トラック別:', trackNotes);

            playStartStep = 0;
            currentOffsetX = 0;
            DTM.setDrawOffset(currentOffsetX, currentOffsetY);
            redrawAll();
        };

        const PITCH_MAP = { c: 0, d: 2, e: 4, f: 5, g: 7, a: 9, b: 11 };

        window.shiftAllNotes = () => {
            const shiftSteps = parseInt(document.getElementById('shift-select')?.value) || 0;
            if (shiftSteps === 0) return;

            const overlay = document.getElementById('midi-loading-overlay');
            overlay.classList.remove('hidden');

            setTimeout(() => {
                tracks.forEach(track => {
                    if (!track.core) return;
                    const notes = [...track.core.getNotes()];
                    notes.forEach(note => {
                        const newStart = note.startStep + shiftSteps;
                        if (newStart < 0) {
                            track.core.deleteNoteById(note.id);
                        } else {
                            track.core.moveNote(note.id, newStart, note.pitch);
                        }
                    });
                });
                redrawAll();
                overlay.classList.add('hidden');
            }, 50);
        };

        window.clearCurrentTrackNotes = () => {
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            if (!activeTrack?.core) return;
            activeTrack.core.beginBatch();
            activeTrack.core.clearNotesWithoutHistory();
            activeTrack.core.endBatch();
            activeTrack.core.saveHistory();
            redrawAll();
        };


        window.generateRandomPattern = () => {
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            if (!activeTrack?.core) return;

            const stepsPerBar = renderConfig.stepsPerBar;
            const numBars = 8;
            const startStep = playStartStep;

            // --- 修正ポイント：8分音符の間隔 ---
            // 16分音符が12ステップの場合、8分音符は24ステップ
            const noteLength = 24;

            const octaveOffset = 60;
            const basePitch = renderConfig.pitchRangeStart + octaveOffset;

            const scales = [
                [0, 2, 4, 5, 7, 9, 11], // Major
                [0, 2, 3, 5, 7, 8, 10], // Minor
                [0, 2, 4, 7, 9],        // Pentatonic Major
            ];

            const selectedScale = scales[Math.floor(Math.random() * scales.length)];
            const rootOffset = Math.floor(Math.random() * 12);

            const availablePitches = [];
            for (let i = 0; i < 12; i++) {
                const noteInOctave = (i - rootOffset + 12) % 12;
                if (selectedScale.includes(noteInOctave)) {
                    availablePitches.push(basePitch + i);
                }
            }

            activeTrack.core.beginBatch();

            for (let bar = 0; bar < numBars; bar++) {
                const barStart = startStep + bar * stepsPerBar;
                // 8分音符にすると1小節内の密度が上がるため、音数を少し調整
                const numNotes = Math.floor(Math.random() * 4) + 2;
                const occupiedSteps = new Set();

                for (let i = 0; i < numNotes; i++) {
                    // 8分音符のグリッド（0, 24, 48...）にスナップ
                    let stepInRange = Math.floor(Math.random() * (stepsPerBar / noteLength)) * noteLength;
                    let step = barStart + stepInRange;

                    if (occupiedSteps.has(step)) continue;
                    occupiedSteps.add(step);

                    const pitch = availablePitches[Math.floor(Math.random() * availablePitches.length)];
                    activeTrack.core.addNote(step, pitch, { noteLengthSteps: noteLength });
                }
            }

            activeTrack.core.endBatch();
            activeTrack.core.saveHistory();
            redrawAll();
        };

        window.loadMML = () => {
            const mmlInput = document.getElementById('mml-input').value;
            if (!mmlInput) return;

            clearAllNotes();
            setLoadMode(true);

            const PITCH_MAP = { c: 0, d: 2, e: 4, f: 5, g: 7, a: 9, b: 11 };
            const stepsPerBar = 192;

            // 1. 全体からコメントを除去し、空白・改行・セミコロンを掃除して「1本の長い文字列」にする
            // ただし、@n を識別するために最低限の整形だけ行う
            const fullMML = mmlInput
                .replace(/\/\*[\s\S]*?\*\//g, '')  // ブロックコメント除去 (/* ... */)
                .replace(/\/\/.*$/gm, '')   // 行コメント除去 (//)
                .replace(/[\n\r;]+/g, ' ')  // 改行とセミコロンをスペースに置換
                .trim();

            // 2. @(\d+) で分割し、各トラックごとの塊を作る
            // split(/(@\d+)/) を使うと [@0, "t150...", @1, "o4..."] のような配列になる
            const parts = fullMML.split(/(@\d+)/).filter(p => p.trim().length > 0);

            let currentTrack = tracks.find(t => t.id === 'melody');
            let octave = 4;
            let currentStep = 0;
            let baseLength = 16;

            // 分割された [@0, "本文", @1, "本文"] をループ
            for (let i = 0; i < parts.length; i++) {
                const part = parts[i].trim();

                // ヘッダー判定 (@0, @1 など)
                if (part.startsWith('@')) {
                    let trackIdx = parseInt(part.substring(1));
                    // @5以上は@2（ベース）に統一
                    if (trackIdx >= 5) {
                        trackIdx = 2;
                    }
                    currentTrack = tracks.find(t => t.id === ['melody', 'submelody', 'bass', 'chord'][trackIdx]);

                    // トラックが変わるタイミングで各種設定をリセット
                    octave = 4;
                    currentStep = 0;
                    baseLength = 16;
                    continue;
                }

                // 本文（body）のパース（currentTrack がない場合は無視）
                if (!currentTrack || !currentTrack.core) continue;

                const body = part.replace(/\s+/g, '').toLowerCase();
                let j = 0;

                const parseLength = () => {
                    let numStr = '';
                    while (j < body.length && /\d/.test(body[j])) {
                        numStr += body[j];
                        j++;
                    }
                    let len = numStr ? parseInt(numStr) : baseLength;
                    let steps = Math.round(stepsPerBar / len);
                    while (j < body.length && body[j] === '.') {
                        steps = Math.round(steps * 1.5);
                        j++;
                    }
                    return steps;
                };

                while (j < body.length) {
                    let ch = body[j];

                    if (ch === 'o') {
                        j++;
                        let numStr = '';
                        while (j < body.length && /\d/.test(body[j])) {
                            numStr += body[j];
                            j++;
                        }
                        octave = parseInt(numStr) || 4;
                    } else if (ch === '>') {
                        octave++; j++;
                    } else if (ch === '<') {
                        octave--; j++;
                    } else if (ch === 'l') {
                        j++;
                        let numStr = '';
                        while (j < body.length && /\d/.test(body[j])) {
                            numStr += body[j];
                            j++;
                        }
                        baseLength = parseInt(numStr) || 16;
                    } else if (ch === 'r') {
                        j++;
                        currentStep += parseLength();
                    } else if (ch === 't' || ch === 'v' || ch === 'q') {
                        j++;
                        let numStr = '';
                        while (j < body.length && /\d/.test(body[j])) {
                            numStr += body[j];
                            j++;
                        }
                        if (ch === 't' && currentTrack.id === 'melody') {
                            const bpmInput = document.getElementById('bpm-input');
                            if (bpmInput) bpmInput.value = numStr;
                        }
                    } else if (ch === '[') {
                        j++;
                        const chordNotes = [];
                        const savedOctave = octave;
                        while (j < body.length && body[j] !== ']') {
                            let c = body[j];
                            if (PITCH_MAP.hasOwnProperty(c)) {
                                let pitch = PITCH_MAP[c];
                                j++;
                                if (body[j] === '#' || body[j] === '+') { pitch++; j++; }
                                else if (body[j] === '-') { pitch--; j++; }
                                chordNotes.push((octave + 1) * 12 + pitch);
                            } else if (c === '>') { octave++; j++; }
                            else if (c === '<') { octave--; j++; }
                            else { j++; }
                        }
                        if (body[j] === ']') j++;
                        const steps = parseLength();
                        for (const p of chordNotes) {
                            currentTrack.core.addNote(currentStep, p, { noteLengthSteps: Math.max(1, steps) });
                        }
                        currentStep += steps;
                        octave = savedOctave;
                    } else if (PITCH_MAP.hasOwnProperty(ch)) {
                        let pitch = PITCH_MAP[ch];
                        j++;
                        if (body[j] === '#' || body[j] === '+') { pitch++; j++; }
                        else if (body[j] === '-') { pitch--; j++; }
                        const midiPitch = (octave + 1) * 12 + pitch;
                        const steps = parseLength();
                        currentTrack.core.addNote(currentStep, midiPitch, { noteLengthSteps: Math.max(1, steps) });
                        currentStep += steps;
                    } else {
                        j++;
                    }
                }
            }

            // --- 後処理 ---
            console.log('MML読み込み完了');
            setLoadMode(false);
            playStartStep = 0;
            currentOffsetX = 0;
            if (typeof DTM !== 'undefined') DTM.setDrawOffset(currentOffsetX, currentOffsetY);
            redrawAll();
            tracks.forEach(track => {
                if (track.core && track.core.addHistoryOnce) track.core.addHistoryOnce();
            });
            if (typeof updateUndoRedoButtons === 'function') updateUndoRedoButtons();
        };

        window.undoNotes = () => {
            const now = Date.now();
            if (now - lastUndoTime < 100) return;
            lastUndoTime = now;
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            if (activeTrack?.core) {
                activeTrack.core.undo();
                redrawAll();
                updateUndoRedoButtons();
            }
        };

        window.redoNotes = () => {
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            if (activeTrack?.core) {
                activeTrack.core.redo();
                redrawAll();
                updateUndoRedoButtons();
            }
        };

        // 入力要素（textarea、text input等）のキー入力とペースト操作が親要素に伝搬しないようにする
        const inputElements = document.querySelectorAll('textarea');
        inputElements.forEach(element => {
            element.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + Z, Y, V, C, X などピアノロール側で処理されるキーの伝搬を防ぐ
                if (e.ctrlKey || e.metaKey) {
                    if (['KeyZ', 'KeyY', 'KeyV', 'KeyC', 'KeyX'].includes(e.code)) {
                        e.stopPropagation();
                    }
                }
            });
            element.addEventListener('paste', (e) => {
                e.stopPropagation();
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.code === 'KeyZ' && !e.shiftKey) {
                    e.preventDefault();
                    undoNotes();
                } else if ((e.code === 'KeyZ' && e.shiftKey) || e.code === 'KeyY') {
                    e.preventDefault();
                    redoNotes();
                } else if (e.code === 'KeyC' && selectedNotes.length > 0) {
                    e.preventDefault();
                    copiedNotes = [...selectedNotes];
                    console.log(`Copied ${copiedNotes.length} notes`);
                } else if (e.code === 'KeyX' && selectedNotes.length > 0) {
                    e.preventDefault();
                    copiedNotes = [...selectedNotes];
                    const activeTrack = tracks.find(t => t.id === activeTrackId);
                    if (activeTrack?.core) {
                        activeTrack.core.beginBatch();
                        selectedNotes.forEach(note => {
                            activeTrack.core.deleteNoteById(note.id);
                        });
                        activeTrack.core.endBatch();
                        selectedNotes = [];
                        console.log(`Cut ${copiedNotes.length} notes`);
                    }
                } else if (e.code === 'KeyV' && copiedNotes.length > 0) {
                    e.preventDefault();
                    const activeTrack = tracks.find(t => t.id === activeTrackId);
                    if (activeTrack?.core) {
                        const notes = activeTrack.core.getNotes();
                        const minStart = Math.min(...copiedNotes.map(n => n.startStep));
                        let pastedCount = 0;
                        activeTrack.core.beginBatch();
                        copiedNotes.forEach(note => {
                            const newStart = playStartStep + (note.startStep - minStart);
                            const newEnd = newStart + note.durationSteps;
                            // 既存の音符と重なる位置がないかチェック
                            const hasOverlap = notes.some(existing =>
                                existing.pitch === note.pitch &&
                                newStart < existing.startStep + existing.durationSteps &&
                                newEnd > existing.startStep
                            );
                            if (!hasOverlap) {
                                activeTrack.core.addNote(newStart, note.pitch, {
                                    noteLengthSteps: note.durationSteps,
                                    velocity: note.velocity,
                                });
                                pastedCount++;
                            }
                        });
                        activeTrack.core.endBatch();
                        redrawAll();
                        console.log(`Pasted ${pastedCount} notes (skipped ${copiedNotes.length - pastedCount})`);
                    }
                }
            }
        });

        const originalGenerateMML = window.generateMML;
        window.generateMML = () => {
            if (typeof originalGenerateMML === 'function') {
                originalGenerateMML();
            }
            updateUndoRedoButtons();
        };
    </script>
</head>

<body class="bg-gray-100 p-4 min-h-screen">
    <h1 class="text-3xl font-extrabold mb-4 text-gray-800">簡易DAW（Canvas/MML）デモ</h1>

    <!-- MIDI & MML入力 -->
    <div
        class="flex flex-col sm:flex-row flex-wrap gap-2 sm:gap-4 p-2 sm:p-4 bg-white border rounded-lg shadow-md mb-4 sm:mb-6">
        <!-- MIDI Section -->
        <div class="flex flex-wrap gap-2 items-center">
            <span class="text-sm font-medium text-gray-700">MIDI:</span>
            <input type="file" id="midi-file-input" accept=".mid,.midi"
                class="border rounded-md px-2 py-1 text-sm w-full sm:w-auto">
            <button id="midi-load-button" onclick="loadMidiFromSelection()"
                class="px-3 py-1 bg-green-500 text-white rounded-md text-sm hover:bg-green-600">MIDI読込</button>
            <span class="text-xs text-gray-500" id="midi-load-note">※選択したチャンネルがピアノロールに反映されます</span>
        </div>

        <div id="midi-track-selection" class="hidden flex flex-wrap gap-2 items-center"></div>

        <!-- 区切り線 -->
        <div class="w-full h-px bg-gray-300 my-2"></div>

        <!-- MML Section -->
        <div class="flex flex-wrap gap-2 items-start">
            <span class="text-sm font-medium text-gray-700">MML:</span>
            <textarea id="mml-input" rows="2" class="border rounded-md px-2 py-1 text-sm w-full sm:w-64"
                placeholder="MMLを入力"></textarea>
            <button onclick="loadMML()"
                class="px-3 py-1 bg-blue-500 text-white rounded-md text-sm hover:bg-blue-600">MML読込</button>
        </div>

        <div class="flex items-center space-x-2 border-l border-gray-200 pl-4">
            <span class="text-sm font-medium text-gray-700">全体シフト:</span>
            <select id="shift-select" class="border rounded-md px-2 py-1 text-sm">
                <option value="-96">-2分</option>
                <option value="-48">-4分</option>
                <option value="-24">-8分</option>
                <option value="-12">-16分</option>
                <option value="12">+16分</option>
                <option value="24">+8分</option>
                <option value="48">+4分</option>
                <option value="96">+2分</option>
            </select>
            <button onclick="shiftAllNotes()"
                class="px-3 py-1 bg-blue-500 text-white rounded-md text-sm hover:bg-blue-600">適用</button>
        </div>
    </div>

    <div id="midi-loading-overlay" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-8 shadow-2xl flex flex-col items-center space-y-4">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-lg font-semibold text-gray-700">MIDI解析中...</span>
        </div>
    </div>

    <!-- マクロ -->
    <div class="p-2 sm:p-4 bg-white border rounded-lg shadow-md mb-4 sm:mb-6">
        <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-2 sm:mb-4">マクロ</h2>
        <div class="flex flex-wrap gap-2">
            <button onclick="clearCurrentTrackNotes()"
                class="px-3 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md text-sm flex items-center space-x-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                <span>全消去</span>
            </button>
            <button onclick="generateRandomPattern()"
                class="px-3 py-2 bg-purple-500 hover:bg-purple-600 text-white rounded-md text-sm flex items-center space-x-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                <span>ランダム生成（8小節）</span>
            </button>
        </div>
    </div>

    <!-- コントロール系UI -->
    <div class="flex flex-wrap gap-2 sm:gap-4 p-2 sm:p-4 bg-white border rounded-lg shadow-md mb-4 sm:mb-6">
        <!--  транспорт управление -->
        <div class="flex items-center space-x-2">
            <button id="play-button" onclick="togglePlayback()" disabled
                class="px-3 sm:px-4 py-2 bg-gray-300 rounded"></button>
            <button id="pause-button" onclick="pausePlayback()" disabled
                class="px-3 sm:px-4 py-2 bg-gray-300 rounded cursor-not-allowed"></button>
            <button id="record-button" onclick="toggleRecording()" disabled
                class="px-3 sm:px-4 py-2 bg-red-500 hover:bg-red-600 rounded text-white" title="録音">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="8"></circle>
                </svg>
            </button>
            <label class="flex items-center space-x-2 text-sm text-gray-700">
                <input type="checkbox" id="solo-checkbox" onchange="toggleSolo(this.checked)"
                    class="w-4 h-4 text-purple-600 rounded">
                <span>ソロ演奏</span>
            </label>
        </div>

        <!-- 区切り -->
        <div class="hidden sm:block w-px h-8 bg-gray-300"></div>

        <!-- 編集操作 -->
        <div class="flex items-center space-x-2">
            <button id="undo-button" onclick="undoNotes()" disabled
                class="px-2 sm:px-3 py-2 bg-gray-300 rounded cursor-not-allowed" title="元に戻す">
                <svg class="w-4 sm:w-5 h-4 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                </svg>
            </button>
            <button id="redo-button" onclick="redoNotes()" disabled
                class="px-2 sm:px-3 py-2 bg-gray-300 rounded cursor-not-allowed" title="やり直し">
                <svg class="w-4 sm:w-5 h-4 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"></path>
                </svg>
            </button>
        </div>

        <!-- 区切り -->
        <div class="hidden sm:block w-px h-8 bg-gray-300"></div>

        <!-- ツール -->
        <div class="flex items-center space-x-2">
            <span class="text-sm font-medium text-gray-700">ツール:</span>
            <button id="tool-pen" onclick="setToolMode('pen')"
                class="p-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600" title="ペン">
                <i class="mdi mdi-pencil"></i>
            </button>
            <button id="tool-select" onclick="setToolMode('select')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg" title="選択">
                <i class="mdi mdi-vector-selection"></i>
            </button>
            <button id="tool-eraser" onclick="setToolMode('eraser')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg" title="消しゴム">
                <i class="mdi mdi-eraser"></i>
            </button>
        </div>

        <!-- 区切り -->
        <div class="hidden sm:block w-px h-8 bg-gray-300"></div>

        <!-- 音符設定 -->
        <div class="flex items-center space-x-2">
            <span class="text-sm font-medium text-gray-700">音符:</span>
            <select id="note-length-select"
                class="border rounded-md px-2 py-1 text-sm focus:ring-blue-500 focus:border-blue-500 w-20 sm:w-auto">
                <option value="48">4分</option>
                <option value="32">3連4</option>
                <option value="24">8分</option>
                <option value="16">3連8</option>
                <option value="12" selected>16分</option>
                <option value="8">3連16</option>
                <option value="6">32分</option>
                <option value="4">3連32</option>
            </select>
        </div>


        <!-- 区切り -->
        <div class="hidden sm:block w-px h-8 bg-gray-300"></div>

        <!-- BPM -->
        <div class="flex items-center space-x-2">
            <span class="text-sm font-medium text-gray-700">BPM:</span>
            <input type="number" id="bpm-input" value="120" min="20" max="300"
                class="w-14 sm:w-16 border rounded-md px-1 sm:px-2 py-1 text-sm text-center">
        </div>

        <!-- ズーム -->
        <div class="flex items-center space-x-2">
            <span class="text-sm font-medium text-gray-700">横:</span>
            <input type="range" id="zoom-input" value="100" min="25" max="200" step="25" oninput="updateStepWidth()"
                class="w-16 sm:w-20">
            <span id="zoom-label" class="text-sm text-gray-700 w-10 sm:w-12">100%</span>
            <span class="text-sm font-medium text-gray-700 ml-2">縦:</span>
            <input type="range" id="zoom-y-input" value="100" min="50" max="200" step="25" oninput="updateKeyHeight()"
                class="w-16 sm:w-20">
            <span id="zoom-y-label" class="text-sm text-gray-700 w-10 sm:w-12">100%</span>
        </div>

        <!-- ナビゲーションは右端に -->
        <div class="flex items-center space-x-1 ml-auto">
            <button onclick="movePianoRoll('home')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg transition-colors" title="最初へ">
                <i class="mdi mdi-page-first text-lg"></i>
            </button>
            <button onclick="movePianoRoll('up')" class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg transition-colors"
                title="上">
                <i class="mdi mdi-chevron-up text-lg"></i>
            </button>
            <button onclick="movePianoRoll('down')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg transition-colors" title="下">
                <i class="mdi mdi-chevron-down text-lg"></i>
            </button>
            <button onclick="movePianoRoll('left')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg transition-colors" title="左">
                <i class="mdi mdi-chevron-left text-lg"></i>
            </button>
            <button onclick="movePianoRoll('right')"
                class="p-2 bg-gray-300 hover:bg-gray-400 rounded-lg transition-colors" title="右">
                <i class="mdi mdi-chevron-right text-lg"></i>
            </button>
        </div>
    </div>

    <!-- ピアノロール -->
    <div class="flex gap-2">
        <div id="piano-roll-container"
            class="w-full sm:w-[800px] h-[300px] sm:h-[450px] bg-white border border-gray-300 rounded-lg shadow-xl relative"
            style="overflow: hidden;">
            <div id="wrapper" class="absolute inset-0">
            </div>
        </div>
        <div id="v-scrollbar"
            class="relative w-6 h-[300px] sm:h-[450px] bg-gray-200 rounded cursor-pointer flex-shrink-0 hidden sm:block">
            <div id="v-scrollbar-thumb"
                class="absolute left-0 w-full bg-blue-400 rounded hover:bg-blue-500 transition-colors"></div>
        </div>
    </div>

    <div class="w-full sm:w-[800px] mt-2 overflow-hidden">
        <div id="h-scrollbar" class="relative w-full h-6 bg-gray-200 rounded cursor-pointer">
            <div id="h-scrollbar-thumb"
                class="absolute top-0 h-full bg-blue-400 rounded hover:bg-blue-500 transition-colors"></div>
        </div>
    </div>

    <div class="p-2 sm:p-4 bg-white border rounded-lg shadow-md mb-4 sm:mb-6">
        <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-2 sm:mb-4">トラック設定</h2>

        <div class="flex flex-row items-center gap-2 mb-2">
            <label for="instrument-preset" class="text-sm font-medium text-gray-500 whitespace-nowrap">
                楽器:
            </label>

            <select id="instrument-preset" onchange="loadInstrumentPreset(this.value)"
                class="bg-gray-100/10 border border-gray-300 rounded-md px-2 py-1 text-sm w-full sm:w-48 focus:outline-none focus:bg-gray-100/20 transition-colors">
            </select>
        </div>

        <div class="mt-2 sm:mt-4 pt-2 sm:pt-4 border-t border-gray-200">
            <div class="flex items-center space-x-2 sm:space-x-4">
                <span class="text-sm font-medium text-gray-700 whitespace-nowrap">音量:</span>
                <input type="range" id="master-volume-input" value="50" min="0" max="100" step="1"
                    oninput="updateMasterVolume(this.value)" class="w-20 sm:w-32">
                <span id="master-volume-label" class="text-sm text-gray-700 w-10 sm:w-12">50%</span>
            </div>
        </div>

        <div id="track-tabs" class="flex border-b border-gray-200 overflow-x-auto">
        </div>

        <div id="track-content" class="p-2 sm:p-4 border border-t-0 border-gray-200 rounded-b-lg bg-white">
        </div>
    </div>

    <!-- ドラム設定 -->
    <div class="p-2 sm:p-4 bg-white border rounded-lg shadow-md mb-4 sm:mb-6">
        <h2 class="text-lg sm:text-xl font-semibold text-gray-800 mb-2 sm:mb-4">ドラム設定</h2>
        <div class="flex flex-wrap items-center gap-2 sm:gap-4">
            <div class="flex items-center space-x-2">
                <span class="text-sm font-medium text-gray-700">リズム:</span>
                <select id="drum-rhythm-select"
                    class="border rounded-md px-2 sm:px-3 py-1 sm:py-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="none">なし</option>
                    <option value="4beat">4beat</option>
                    <option value="8beat">8beat</option>
                    <option value="16beat">16beat</option>
                    <option value="shuffle">シャッフル</option>
                    <option value="dance" selected>ダンス</option>
                    <option value="bossa">ボサノバ</option>
                    <option value="disco">ディスコ</option>
                </select>
            </div>
        </div>
        <div class="flex items-center space-x-2 mt-2">
            <span class="text-sm font-medium text-gray-700">音量:</span>
            <input type="range" id="drum-volume-input" value="80" min="0" max="100" step="1" class="w-20 sm:w-24">
            <span id="drum-volume-label" class="text-sm text-gray-700 w-10 sm:w-12">80%</span>
        </div>
    </div>

    <hr class="my-4 sm:my-6 border-gray-300">

    <div class="p-2 sm:p-4 bg-gray-800 text-white rounded-lg shadow-lg">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 mb-2 sm:mb-4">
            <h2 class="text-lg sm:text-xl font-semibold">MIDI / MML出力</h2>
            <div class="flex items-center space-x-2">
                <button onclick="exportMIDI()" id="export-midi-button"
                    class="px-3 py-1 bg-purple-600 hover:bg-purple-700 text-white text-sm rounded transition-colors">
                    MIDI出力
                </button>
                <button onclick="generateMML()" id="generate-mml-button"
                    class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white text-sm rounded transition-colors">
                    MML生成
                </button>
                <a href="https://kazuprog.work/prog/js/mml-player/" target="_blank"
                    class="px-3 py-1 bg-gray-600 hover:bg-gray-500 text-white text-sm rounded transition-colors">
                    MML再生テスト <span class="text-xs text-gray-300">(外部リンク)</span>
                </a>
            </div>
        </div>
        <div id="mml-output-container" class="hidden">
            <p id="mml-output-status" class="text-xs text-gray-400 mb-2"></p>
            <div class="flex items-start space-x-2">
                <pre
                    class="flex-1 bg-black p-3 rounded-md overflow-x-auto text-sm"><code id="mml-output" class="block"></code></pre>
                <button onclick="copyMML('normal')" id="copy-mml-normal-button"
                    class="px-2 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded transition-colors" title="コピー">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="flex items-start space-x-2 mt-2">
                <pre
                    class="flex-1 bg-gray-900 p-3 rounded-md overflow-x-auto text-sm text-gray-300"><code id="mml-output-minify" class="block"></code></pre>
                <button onclick="copyMML('minify')" id="copy-mml-minify-button"
                    class="px-2 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded transition-colors" title="コピー">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        window.copyMML = (type) => {
            const mml = type === 'minify'
                ? document.getElementById('mml-output-minify').textContent
                : document.getElementById('mml-output').textContent;
            navigator.clipboard.writeText(mml).then(() => {
                const btn = type === 'minify'
                    ? document.getElementById('copy-mml-minify-button')
                    : document.getElementById('copy-mml-normal-button');
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.add('bg-green-600');
                setTimeout(() => {
                    btn.classList.remove('bg-green-600');
                    btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 1500);
            });
        };
    </script>
</body>

</html>
