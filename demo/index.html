<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88383494" />
    <title>DTM Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@kazuprog/mml-player@1.0.0/dist/mml-player.js"></script>
    <script src="https://colxi.info/midi-parser-js/src/main.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />

    <script type="module">
        const DTM = await import(location.hostname === 'localhost'
            ? 'http://localhost:40298/dist/index.mjs'
            : 'https://onjmin.github.io/dtm/demo/index.mjs');

        import { parseChord } from 'https://rpgen3.github.io/piano/mjs/parseChord.mjs';
        import { parseChords } from 'https://rpgen3.github.io/piano/mjs/parseChords.mjs';
        import * as mdi from 'https://cdn.jsdelivr.net/npm/@mdi/js@7.4.47/mdi.js';
        import { SoundFont } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont.mjs';
        import { SoundFont_drum } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont_drum.mjs';
        import { SoundFont_list } from 'https://rpgen3.github.io/soundfont/mjs/surikov/SoundFont_list.mjs';

        // DTMモジュールから設定及び関数をインポート
        const {
            createAudioContext,
            setupRecorder,
            buildNameToKeyMapping
        } = DTM;
        const {
            DRUM_KEYS,
            DRUM_FONT,
            DRUM_PATTERNS
        } = DTM;
        const {
            INSTRUMENT_PRESETS
        } = DTM;

        const { audioCtx, gainNode, drumGainNode } = createAudioContext();
        const recorderAPI = setupRecorder(audioCtx, gainNode, drumGainNode);

        let masterVolume = 50;
        let drumVolume = 80;
        gainNode.gain.value = 0.5;
        drumGainNode.gain.value = 0.8;
        const soundFonts = {};

        let currentDrumPattern = 'dance';

        const loadDrumSoundFont = async () => {
            try {
                await SoundFont_drum.load({
                    ctx: audioCtx,
                    font: DRUM_FONT,
                    id: '0',
                    keys: Object.values(DRUM_KEYS)
                });
                console.log('Drum SoundFont loaded');
            } catch (e) {
                console.error('Failed to load drum:', e);
            }
        };
        loadDrumSoundFont();

        const playDrumNote = (pitch, velocity, when, duration) => {
            if (!SoundFont_drum.font) return;
            SoundFont_drum.play({
                ctx: audioCtx,
                pitch,
                volume: (drumVolume / 100) * velocity,
                when,
                duration,
                destination: drumGainNode
            });
        };

        const loadSoundFont = async (fontName, instrumentKey, trackId) => {
            try {
                const fullName = `${instrumentKey}_${fontName}`;
                const url = SoundFont.toURL(fullName);
                console.log(`Loading: ${fullName}`);
                console.log(`URL: ${url}`);
                soundFonts[trackId] = await SoundFont.load({
                    ctx: audioCtx,
                    fontName: `_tone_${fullName}`,
                    url
                });
            } catch (e) {
                console.error(`Failed to load ${instrumentKey}_${fontName}:`, e);
            }
        };

        let currentFont = 'FluidR3_GM_sf2_file';
        let nameToKey = {};

        // SoundFont_listを初期化後に楽器をロード
        SoundFont_list.init();
        SoundFont_list.onload(async () => {
            console.log('SoundFont_list loaded');
            const fonts = [...SoundFont_list.tone.keys()];
            console.log('Available fonts:', fonts);
            if (fonts.length > 0) {
                // 楽器名→キーのマッピングを取得
                nameToKey = await buildNameToKeyMapping();
                console.log('Name to Key mapping sample:', Object.entries(nameToKey).slice(0, 5));

                // 楽器プリセット選択UIを生成
                const selectEl = document.getElementById('instrument-preset');
                if (selectEl) {
                    selectEl.innerHTML = '';
                    for (const [key, preset] of Object.entries(INSTRUMENT_PRESETS)) {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = preset.displayName;
                        selectEl.appendChild(option);
                    }
                }

                // デフォルトの楽器プリセットをロード
                await loadInstrumentPreset('piano');
            }
        });

        window.loadInstrumentPreset = async (preset) => {
            const presetData = INSTRUMENT_PRESETS[preset];
            if (!presetData || !currentFont) return;
            const trackIds = ['melody', 'submelody', 'bass', 'chord'];
            for (const trackId of trackIds) {
                const instrumentName = presetData[trackId];
                if (!instrumentName) continue;
                const key = nameToKey[instrumentName];
                if (key) {
                    await loadSoundFont(currentFont, key, trackId);
                    const track = tracks.find(t => t.id === trackId);
                    if (track) track.selectedInstrument = instrumentName;
                }
            }
            redrawAll();
        };
        const playNote = (trackId, pitch, volume, when, duration) => {
            const sf = soundFonts[trackId];
            if (!sf) return;
            sf.play({
                ctx: audioCtx,
                destination: gainNode,
                pitch,
                volume,
                when,
                duration
            });
        };

        const renderConfig = {
            stepsPerBar: 192, // 48 steps/beat * 4 beats/bar
            keyCount: 104, // C-1〜C7
            pitchRangeStart: 0, // MIDI C-1 = 0
            keyHeight: 15,
            stepWidth: 10,
        };
        // C4 (note 60) を中央に配置
        let gridHeight = 430;
        let baseStepWidth = 0.5; // stepsPerBar=192対応
        let baseKeyHeight = 15;
        renderConfig.keyCount = 128; // 鍵盤総数は固定（MIDI規格）

        // 初期Yオフセットを計算
        const getInitialOffsetY = () => {
            return (104 - 1 - 60) * renderConfig.keyHeight - gridHeight / 2;
        };

        window.updateStepWidth = () => {
            // コンテナの高さに応じてkeyHeightを調整
            const container = document.getElementById('piano-roll-container');
            if (container && container.clientHeight > 0) {
                gridHeight = container.clientHeight;
                const optimalKeyHeight = Math.floor(gridHeight / 30); // 約30鍵表示
                renderConfig.keyHeight = Math.max(8, Math.min(15, optimalKeyHeight));
            }
            const rawZoom = parseInt(document.getElementById('zoom-input')?.value);
            const zoom = rawZoom * 2; // 50%→100%, 100%→200%

            const gridCanvas = DTM.getGridCanvas();
            const centerX = currentOffsetX + gridCanvas.width / 2;
            const centerStep = centerX / renderConfig.stepWidth;

            renderConfig.stepWidth = baseStepWidth * zoom / 100;
            document.getElementById('zoom-label').textContent = rawZoom + '%';

            currentOffsetX = centerStep * renderConfig.stepWidth - gridCanvas.width / 2;
            currentOffsetX = Math.max(0, currentOffsetX);
            DTM.setDrawOffset(currentOffsetX, currentOffsetY);
            updateScrollbar();
            redrawAll();
        };

        window.updateKeyHeight = () => {
            const zoomYInput = document.getElementById('zoom-y-input');
            const scrollContainer = document.getElementById('piano-roll-container');
            if (!zoomYInput || !scrollContainer) return;

            // --- 1. 更新前の値で「現在の中央位置」を計算 ---
            // 中央のY座標 = 現在のスクロール位置 + 表示領域の半分
            const centerY = scrollContainer.scrollTop + (scrollContainer.clientHeight / 2);
            // 中央が「何番目の鍵盤か」を保持 (更新前の keyHeight を使用)
            const centerKeyIndex = centerY / renderConfig.keyHeight;

            // --- 2. 設定値の更新 ---
            const rawZoomY = parseInt(zoomYInput.value);
            const zoomFactor = rawZoomY / 100;
            renderConfig.keyHeight = baseKeyHeight * zoomFactor;

            // --- 3. UIと内部状態の反映 ---
            document.getElementById('zoom-y-label').textContent = rawZoomY + '%';

            // 総高さが変わるため、再描画やスクロールバーの整合性を取る
            updateVScrollbar();

            // --- 4. スクロール位置の復元 ---
            // 新しい keyHeight における中央位置を計算し、そこから表示領域の半分を引く
            scrollContainer.scrollTop = (centerKeyIndex * renderConfig.keyHeight) - (scrollContainer.clientHeight / 2);

            redrawAll();
        };

        window.updateMasterVolume = (value) => {
            masterVolume = parseInt(value) || 50;
            gainNode.gain.value = masterVolume / 100;
            document.getElementById('master-volume-label').textContent = masterVolume + '%';
        };

        const hexToRgb = (hex) =>
            [0, 1, 2].map(i => parseInt(hex.slice(1 + i * 2, 3 + i * 2), 16))
        const tracks = [
            { id: 'melody', name: 'メロディー', color: hexToRgb('#3B82F6'), instrument: 0, core: null, volume: 100, selectedInstrument: '', mml: '' },
            { id: 'submelody', name: 'サブメロ', color: hexToRgb('#8B5CF6'), instrument: 1, core: null, volume: 95, selectedInstrument: '', mml: '' },
            { id: 'bass', name: 'ベース', color: hexToRgb('#10B981'), instrument: 2, core: null, volume: 88, selectedInstrument: '', mml: '' },
            { id: 'chord', name: '伴奏', color: hexToRgb('#F59E0B'), instrument: 3, core: null, volume: 76, selectedInstrument: '', mml: '', savedChordInput: '', savedChordPattern: 'block' },
        ];
        let activeTrackId = 'melody';
        let activeToolMode = 'pen';
        let isSelecting = false;
        let dragMode = 'rect'; // 'rect' (範囲選択) または 'move' (移動)
        let selectionRect = null;
        let selectionStart = null;
        let selectedNotesOriginalPositions = []; // 選択開始時のノート元位置
        let selectedNotes = [];
        let copiedNotes = []; // コピーしたノート
        let isPlaying = false;
        let isPaused = false;
        let isSolo = false;
        let pausedPlayStep = 0;
        let pausedGainValue = 1;
        let currentInsertLength = 48; // 新しく音を置くときの長さ
        let snapGridSteps = 12; // 音の端をつまんで伸ばす時のスナップ単位
        let gridLineSteps = 48; // 4分音符（グリッド線の間隔）
        let mmlPlayer = null;
        let lastUndoTime = 0;

        function updateUndoRedoButtons() {
            if (typeof tracks === 'undefined' || typeof activeTrackId === 'undefined') return;
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            const undoBtn = document.getElementById('undo-button');
            const redoBtn = document.getElementById('redo-button');
            if (activeTrack?.core && undoBtn && redoBtn) {
                undoBtn.disabled = !activeTrack.core.canUndo();
                redoBtn.disabled = !activeTrack.core.canRedo();
                undoBtn.className = undoBtn.disabled
                    ? 'px-4 py-2 bg-gray-300 rounded cursor-not-allowed'
                    : 'px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded';
                redoBtn.className = redoBtn.disabled
                    ? 'px-4 py-2 bg-gray-300 rounded cursor-not-allowed'
                    : 'px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded';
            }
        }

        let currentOffsetX = 0;
        let currentOffsetY = getInitialOffsetY();
        const scrollAmount = 16 * renderConfig.stepWidth; // 例: 1小節分を移動量とする
        const leftPaddingSteps = 192 * 16; // 16小節分の余白
        let noteLengthSelectEl = null;
        let playStartStep = 0; // 再生開始位置（ステップ）

        // ----------------------------------------------------------------------
        // NOTE: このデモは「常に最新の動作確認」を行うための最重要入口。
        // 以降の変更でもここを更新して、実装とデモが乖離しないようにすること。
        // ----------------------------------------------------------------------

        const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

        const getMaxOffsetY = () => {
            const gridCanvas = DTM.getGridCanvas();
            const totalHeight = renderConfig.keyCount * renderConfig.keyHeight;
            return Math.max(0, totalHeight - gridCanvas.height);
        };

        const ensureNoteLengthOption = (value) => {
            if (!noteLengthSelectEl) return;
            const normalized = String(value);
            if (!noteLengthSelectEl.querySelector(`option[value="${normalized}"]`)) {
                const option = document.createElement('option');
                option.value = normalized;
                option.textContent = `${value}ステップ`;
                noteLengthSelectEl.appendChild(option);
            }
            noteLengthSelectEl.value = normalized;
        };

        const snapToGrid = (duration) => {
            // グリッド単位の倍数にスナップ
            const snapped = Math.round(duration / snapGridSteps) * snapGridSteps;
            // 最小値はグリッド1つ分
            return Math.max(snapped, snapGridSteps);
        };

        const playPreviewNote = (pitch, durationSteps) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const activeTrack = tracks.find(t => t.id === activeTrackId);
            if (!activeTrack) return;
            playNote(activeTrackId, pitch, activeTrack.volume / 100, 0, 0.1);
        };

        window.movePianoRoll = (direction) => {
            const { keyHeight, stepWidth, stepsPerBar } = renderConfig;
            const gridCanvas = DTM.getGridCanvas();
            const visibleSteps = gridCanvas.width / stepWidth;
            const visibleBars = Math.round(visibleSteps / stepsPerBar);
            const halfBars = Math.max(1, Math.round(visibleBars / 2));
            const horizontalScroll = halfBars * stepsPerBar * stepWidth;
            const verticalScroll = Math.round(visibleBars / 2) * keyHeight;
            const maxOffsetY = getMaxOffsetY();
            const leftPaddingWidth = leftPaddingSteps * stepWidth;
            const maxNoteStep = getMaxNoteStep();
            const maxOffsetX = maxNoteStep * stepWidth - gridCanvas.width + leftPaddingWidth;
            const minOffsetX = 0;

            switch (direction) {
                case 'home':
                    currentOffsetX = 0;
                    break;
                case 'right':
                    currentOffsetX = clamp(currentOffsetX + horizontalScroll, minOffsetX, maxOffsetX);
                    break;
                case 'left':
                    currentOffsetX = clamp(currentOffsetX - horizontalScroll, minOffsetX, maxOffsetX);
                    break;
                case 'up':
                    currentOffsetY = clamp(currentOffsetY - verticalScroll, 0, maxOffsetY);
                    break;
                case 'down':
                    currentOffsetY = clamp(currentOffsetY + verticalScroll, 0, maxOffsetY);
                    break;
            }

            DTM.setDrawOffset(currentOffsetX, currentOffsetY);

            redrawAll();
        };

        // 全トラックを再描画するメインの関数
        const redrawAll = () => {
            DTM.drawGrid(gridLineSteps);

            tracks.forEach((track, i) => {
                if (!track.core) return;
                const [r, g, b] = track.color;
                const a = track.id === activeTrackId
                    ? 1
                    : 0.3;
                DTM.drawNotes(
                    track.core.getNotes(),
                    [r, g, b, a]
                );
            });

            if (activeToolMode === 'select' && selectionRect) {
                const gridCtx = DTM.getGridContext();
                gridCtx.save();
                gridCtx.strokeStyle = '#10B981';
                gridCtx.lineWidth = 2;
                gridCtx.setLineDash([5, 3]);
                gridCtx.strokeRect(selectionRect.x, selectionRect.y, selectionRect.width, selectionRect.height);
                gridCtx.fillStyle = 'rgba(16, 185, 129, 0.1)';
                gridCtx.fillRect(selectionRect.x, selectionRect.y, selectionRect.width, selectionRect.height);
                gridCtx.restore();

                if (selectedNotes.length > 0) {
                    const selectedIds = new Set(selectedNotes.map(n => n.id));
                    const activeTrack = tracks.find(t => t.id === activeTrackId);
                    const [r, g, b] = activeTrack?.color || [59, 130, 246];
                    if (activeTrack?.core) {
                        DTM.drawSelectedNotes(
                            activeTrack.core.getNotes(),
                            selectedIds
                        );
                    }
                }
            }

            drawStartLine();
            updateScrollbar();
        };

        const getMaxNoteStep = () => {
            let maxStep = renderConfig.stepsPerBar * 4;
            tracks.forEach(track => {
                if (!track.core) return;
                track.core.getNotes().forEach(note => {
                    const endStep = note.startStep + note.durationSteps;
                    if (endStep > maxStep) maxStep = endStep;
                });
            });
            return maxStep;
        };

        const updateScrollbar = () => {
            const scrollbar = document.getElementById('h-scrollbar');
            const thumb = document.getElementById('h-scrollbar-thumb');
            if (!scrollbar || !thumb) return;

            const maxNoteStep = getMaxNoteStep();
            const visibleWidth = DTM.getGridCanvas().width;
            const scrollbarWidth = scrollbar.clientWidth;
            const leftPaddingWidth = leftPaddingSteps * renderConfig.stepWidth;
            const totalContentWidth = maxNoteStep * renderConfig.stepWidth;
            const maxOffsetX = totalContentWidth - visibleWidth + leftPaddingWidth;
            const minOffsetX = 0;

            if (maxOffsetX <= 0) {
                thumb.style.width = '100%';
                thumb.style.left = '0';
            } else {
                const thumbWidth = Math.max(40, (visibleWidth / (totalContentWidth + leftPaddingWidth)) * scrollbarWidth);
                const range = maxOffsetX - minOffsetX;
                const ratio = (currentOffsetX - minOffsetX) / range;
                const thumbLeft = ratio * (scrollbarWidth - thumbWidth);
                thumb.style.width = `${thumbWidth}px`;
                thumb.style.left = `${Math.max(0, Math.min(thumbLeft, scrollbarWidth - thumbWidth))}px`;
            }

            updateVScrollbar();
        };

        const initScrollbar = () => {
            const scrollbar = document.getElementById('h-scrollbar');
            const thumb = document.getElementById('h-scrollbar-thumb');
            if (!scrollbar || !thumb) return;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartOffset = 0;

            const handleScroll = (clientX) => {
                const rect = scrollbar.getBoundingClientRect();
                const x = clientX - rect.left;
                const thumbWidth = parseFloat(thumb.style.width);
                const thumbLeft = Math.max(0, Math.min(x - thumbWidth / 2, scrollbar.clientWidth - thumbWidth));
                const ratio = thumbLeft / (scrollbar.clientWidth - thumbWidth);

                const maxNoteStep = getMaxNoteStep();
                const visibleWidth = DTM.getGridCanvas().width;
                const leftPaddingWidth = leftPaddingSteps * renderConfig.stepWidth;
                const totalContentWidth = maxNoteStep * renderConfig.stepWidth;
                const maxOffsetX = totalContentWidth - visibleWidth + leftPaddingWidth;
                const minOffsetX = 0;
                const range = maxOffsetX - minOffsetX;
                currentOffsetX = clamp(minOffsetX + ratio * range, minOffsetX, maxOffsetX);
                DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                updateScrollbar();
                redrawAll();
            };

            scrollbar.addEventListener('pointerdown', (e) => {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartOffset = currentOffsetX;
                e.preventDefault();
            });

            document.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const maxNoteStep = getMaxNoteStep();
                const visibleWidth = DTM.getGridCanvas().width;
                const leftPaddingWidth = leftPaddingSteps * renderConfig.stepWidth;
                const totalContentWidth = maxNoteStep * renderConfig.stepWidth;
                const maxOffsetX = totalContentWidth - visibleWidth + leftPaddingWidth;
                const minOffsetX = 0;
                const range = maxOffsetX - minOffsetX;

                const rect = scrollbar.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const thumbWidth = parseFloat(thumb.style.width);
                const thumbLeft = Math.max(0, Math.min(x - thumbWidth / 2, scrollbar.clientWidth - thumbWidth));
                const ratio = thumbLeft / (scrollbar.clientWidth - thumbWidth);
                currentOffsetX = clamp(minOffsetX + ratio * range, minOffsetX, maxOffsetX);
                DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                updateScrollbar();
                redrawAll();
            });

            document.addEventListener('pointerup', () => {
                isDragging = false;
            });
        };

        const updateVScrollbar = () => {
            const scrollbar = document.getElementById('v-scrollbar');
            const thumb = document.getElementById('v-scrollbar-thumb');
            if (!scrollbar || !thumb) return;

            const gridCanvas = DTM.getGridCanvas();
            const totalHeight = renderConfig.keyCount * renderConfig.keyHeight;
            const visibleHeight = gridCanvas.height;
            const scrollbarHeight = scrollbar.clientHeight;

            if (totalHeight <= visibleHeight) {
                thumb.style.height = '100%';
                thumb.style.top = '0';
                return;
            }

            const thumbHeight = Math.max(40, (visibleHeight / totalHeight) * scrollbarHeight);
            const maxOffset = getMaxOffsetY();
            const ratio = currentOffsetY / maxOffset;
            const thumbTop = ratio * (scrollbarHeight - thumbHeight);

            thumb.style.height = `${thumbHeight}px`;
            thumb.style.top = `${thumbTop}px`;
        };

        const initVScrollbar = () => {
            const scrollbar = document.getElementById('v-scrollbar');
            const thumb = document.getElementById('v-scrollbar-thumb');
            if (!scrollbar || !thumb) return;

            let isDragging = false;

            scrollbar.addEventListener('pointerdown', (e) => {
                isDragging = true;
                e.preventDefault();
            });

            document.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const maxOffset = getMaxOffsetY();

                const rect = scrollbar.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const thumbHeight = parseFloat(thumb.style.height);
                const thumbTop = Math.max(0, Math.min(y - thumbHeight / 2, scrollbar.clientHeight - thumbHeight));
                const ratio = thumbTop / (scrollbar.clientHeight - thumbHeight);
                currentOffsetY = Math.max(0, ratio * maxOffset);
                DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                updateScrollbar();
                redrawAll();
            });

            document.addEventListener('pointerup', () => {
                isDragging = false;
            });
        };

        // 再生開始位置の縦線を描画
        const drawStartLine = () => {
            const gridCanvas = DTM.getGridCanvas();
            const ctx = DTM.getGridContext();
            if (!ctx) return;
            const x = playStartStep * renderConfig.stepWidth - currentOffsetX;
            if (x < -10 || x > gridCanvas.width + 10) return;
            ctx.save();
            ctx.strokeStyle = '#10B981';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, gridCanvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        };

        // MML生成
        window.generateMML = () => {
            const fullMML = tracks.map((track, i) => {
                if (!track.core) return `@${i} `;
                const mml = track.core.getMML(track.volume);
                return `@${i} ${mml.trim()}`;
            }).join(";\n");
            const minifyMML = tracks.map((track, i) => {
                if (!track.core) return `@${i}`;
                const mml = track.core.getMML(track.volume);
                return `@${i}${mml.trim().replace(/\s+/g, '')}`;
            }).join(";");

            document.getElementById("mml-output").textContent = fullMML.trim();
            document.getElementById("mml-output-minify").textContent = minifyMML.trim();
            document.getElementById("mml-output-status").textContent =
                `(${tracks.length}トラック) 通常: ${fullMML.length}文字 / minify: ${minifyMML.length}文字`;

            document.getElementById('mml-output-container').classList.remove('hidden');
        };

        // MIDI出力
        window.exportMIDI = () => {
            const bpm = parseInt(document.getElementById('bpm-input')?.value) || 120;
            const div = 480;
            const stepsPerBeat = 48;
            const tickPerStep = div / stepsPerBeat;
            const midiTracks = [];

            // Melody, Submelody, Bass, Chord tracks
            tracks.forEach((track, ch) => {
                if (!track.core) return;
                const notes = track.core.getNotes();
                if (notes.length === 0) return;

                const events = [];
                notes.forEach(n => {
                    const startTick = Math.round(n.startStep * tickPerStep);
                    const endTick = Math.round((n.startStep + (n.durationSteps || 1)) * tickPerStep);
                    const vel = Math.round((n.velocity ?? 100) * (track.volume || 100) / 100);

                    events.push({ t: startTick, m: [0x90 | (ch & 0x0F), n.pitch, vel] });
                    events.push({ t: endTick, m: [0x90 | (ch & 0x0F), n.pitch, 0] });
                });

                events.sort((a, b) => a.t - b.t);
                midiTracks.push(events);
            });

            // Drum track
            if (currentDrumPattern !== 'none' && DRUM_PATTERNS[currentDrumPattern]) {
                const pattern = DRUM_PATTERNS[currentDrumPattern];
                const stepsPerBar = renderConfig.stepsPerBar;
                const maxStep = Math.max(...tracks.filter(t => t.core).map(t => {
                    const notes = t.core.getNotes();
                    return notes.length > 0 ? Math.max(...notes.map(n => n.startStep + n.durationSteps)) : 0;
                }), stepsPerBar);

                const drumEvents = [];
                const numBars = Math.ceil(maxStep / stepsPerBar);

                for (let bar = 0; bar < numBars; bar++) {
                    const barStart = bar * stepsPerBar;
                    pattern.forEach(drum => {
                        const step = barStart + drum.step;
                        if (step >= maxStep) return;
                        const vel = Math.round((drum.velocity ?? 1.0) * (drumVolume / 100) * 127);

                        drumEvents.push({ t: Math.round(step * tickPerStep), m: [0x99, drum.pitch, vel] });
                        drumEvents.push({ t: Math.round((step + 1) * tickPerStep), m: [0x99, drum.pitch, 0] });
                    });
                }

                drumEvents.sort((a, b) => a.t - b.t);
                if (drumEvents.length > 0) midiTracks.push(drumEvents);
            }

            const arr = [];
            midiHeaderChunks(arr, midiTracks.length + 1, div);
            midiTrackChunks(arr, a => {
                a.push(0, 0xFF, 0x51, 0x03, ...midiTo3byte(Math.round(6e7 / bpm)));
            });

            for (const events of midiTracks) {
                midiTrackChunks(arr, a => {
                    let lastTick = 0;
                    for (const ev of events) {
                        const delta = ev.t - lastTick;
                        a.push(...midiDeltaTime(delta), ...ev.m);
                        lastTick = ev.t;
                    }
                });
            }

            const blob = new Blob([new Uint8Array(arr).buffer], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'dtm.mid';
            link.click();
            URL.revokeObjectURL(url);
        };

        const midiTo2byte = n => [(n & 0xff00) >> 8, n & 0xff];
        const midiTo3byte = n => [(n & 0xff0000) >> 16, ...midiTo2byte(n)];
        const midiTo4byte = n => [(n & 0xff000000) >> 24, ...midiTo3byte(n)];
        const midiHeaderChunks = (arr, trackCount, div) => {
            arr.push(0x4D, 0x54, 0x68, 0x64);
            arr.push(...midiTo4byte(6));
            arr.push(...midiTo2byte(1));
            arr.push(...midiTo2byte(trackCount));
            arr.push(...midiTo2byte(div));
        };
        const midiTrackChunks = (arr, func) => {
            arr.push(0x4D, 0x54, 0x72, 0x6B);
            const a = [];
            func(a);
            a.push(...midiDeltaTime(0));
            a.push(0xFF, 0x2F, 0x00);
            arr.push(...midiTo4byte(a.length));
            arr.push(...a);
        };
        const midiDeltaTime = n => {
            const res = [];
            res.push(n & 0x7F);
            while (n >>= 7) {
                res.push((n & 0x7F) | 0x80);
            }
            return res.reverse();
        };

        // UIコントロール更新 (既存ロジックをトップレベルに移動)
        const updateControls = () => {
            // DOMを破壊する前に現在の値を保存
            const chordInputEl = document.getElementById('chord-input');
            const chordPatternEl = document.getElementById('chord-pattern-select');
            const chordRootEl = document.getElementById('chord-root-select');
            if (chordInputEl || chordPatternEl || chordRootEl) {
                const chordTrack = tracks.find(t => t.id === 'chord');
                if (chordTrack) {
                    if (chordInputEl) chordTrack.savedChordInput = chordInputEl.value;
                    if (chordPatternEl) chordTrack.savedChordPattern = chordPatternEl.value;
                    if (chordRootEl) chordTrack.savedChordRoot = chordRootEl.value;
                }
            }

            // 再生ボタン
            const playButton = document.getElementById('play-button');
            if (isPlaying) {
                playButton.className = 'px-4 py-2 rounded-lg font-semibold transition-colors flex items-center space-x-2 bg-red-500 hover:bg-red-600 text-white';
                playButton.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="${mdi.mdiStop}"></path></svg><span>停止</span>`;
            } else if (isPaused) {
                playButton.className = 'px-4 py-2 rounded-lg font-semibold transition-colors flex items-center space-x-2 bg-green-500 hover:bg-green-600 text-white';
                playButton.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="${mdi.mdiPlay}"></path></svg><span>再開</span>`;
            } else {
                playButton.className = 'px-4 py-2 rounded-lg font-semibold transition-colors flex items-center space-x-2 bg-green-500 hover:bg-green-600 text-white';
                playButton.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="${mdi.mdiPlay}"></path></svg><span>試聴</span>`;
            }

            // 一時停止ボタン（再生中にのみ有効）
            const pauseButton = document.getElementById('pause-button');
            if (isPlaying) {
                pauseButton.disabled = false;
                pauseButton.className = 'px-4 py-2 rounded-lg font-semibold transition-colors flex items-center space-x-2 bg-yellow-500 hover:bg-yellow-600 text-white';
                pauseButton.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="${mdi.mdiPause}"></path></svg><span>一時停止</span>`;
            } else {
                pauseButton.disabled = true;
                pauseButton.className = 'px-4 py-2 rounded-lg font-semibold transition-colors flex items-center space-x-2 bg-gray-300 text-gray-500 cursor-not-allowed';
                pauseButton.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="${mdi.mdiPause}"></path></svg><span>一時停止</span>`;
            }

            const trackTabs = document.getElementById('track-tabs');
            const trackContent = document.getElementById('track-content');

            trackTabs.innerHTML = '';
            trackContent.innerHTML = '';

            tracks.forEach(t => {
                // タブ
                const isActive = t.id === activeTrackId;
                const tabClass = `px-4 py-2 text-sm font-medium transition-colors cursor-pointer rounded-t-lg ${isActive ? 'bg-white border-x border-t border-gray-200 text-purple-600 -mb-px' : 'bg-gray-100 hover:bg-gray-200 text-gray-700 border-b border-gray-200'}`;
                trackTabs.innerHTML += `<button onclick="switchTrack('${t.id}')" class="${tabClass}">${t.name}</button>`;

                // コンテンツ
                if (isActive) {
                    const instrumentName = t.selectedInstrument || '';
                    let content = `
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center space-x-3 w-64 text-sm text-gray-700">
                            <span class="font-medium">velocity:</span>
                            <span id="volume-label-${t.id}" class="w-8 text-right font-mono">${t.volume}</span>
                            <input
                                type="range"
                                min="0"
                                max="127"
                                step="1"
                                value="${t.volume}"
                                oninput="handleVolumeChange('${t.id}', this.value)"
                                class="flex-1 h-2 bg-purple-100 rounded-lg appearance-none cursor-pointer accent-purple-500"
                            />
                        </label>
                        <span class="text-sm text-gray-500">音色: @${t.instrument} ${instrumentName}</span>
                    </div>
                    `;
                    // 伴奏トラックの場合は和音入力欄を追加
                    if (t.id === 'chord') {
                        const savedInput = t.savedChordInput || '';
                        const savedPattern = t.savedChordPattern || 'block';
                        const savedRoot = t.savedChordRoot || '0';
                        content += `
                        <div class="flex flex-col gap-2 mt-3 pt-3 border-t border-gray-200">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-sm font-medium text-gray-700">和音:</span>
                                <select id="chord-pattern-select" class="border rounded-md px-2 py-1 text-sm">
                                    <option value="block" ${savedPattern === 'block' ? 'selected' : ''}>ブロック</option>
                                    <option value="arpeggio" ${savedPattern === 'arpeggio' ? 'selected' : ''}>アルペジオ</option>
                                    <option value="arpeggio-fast" ${savedPattern === 'arpeggio-fast' ? 'selected' : ''}>アルペジオ（ジャラーン）</option>
                                    <option value="offbeat" ${savedPattern === 'offbeat' ? 'selected' : ''}>裏打ち</option>
                                    <option value="alternating" ${savedPattern === 'alternating' ? 'selected' : ''}>交互奏</option>
                                </select>
                               <select id="chord-root-select" class="border border-gray-300 rounded-md px-2 py-1 text-sm bg-gray-100/10 focus:outline-none">
                                    <option value="11" ${savedRoot === '11' ? 'selected' : ''}>B</option>
                                    <option value="10" ${savedRoot === '10' ? 'selected' : ''}>A#</option>
                                    <option value="9" ${savedRoot === '9' ? 'selected' : ''}>A</option>
                                    <option value="8" ${savedRoot === '8' ? 'selected' : ''}>G#</option>
                                    <option value="7" ${savedRoot === '7' ? 'selected' : ''}>G</option>
                                    <option value="6" ${savedRoot === '6' ? 'selected' : ''}>F#</option>
                                    <option value="5" ${savedRoot === '5' ? 'selected' : ''}>F</option>
                                    <option value="4" ${savedRoot === '4' ? 'selected' : ''}>E</option>
                                    <option value="3" ${savedRoot === '3' ? 'selected' : ''}>D#</option>
                                    <option value="2" ${savedRoot === '2' ? 'selected' : ''}>D</option>
                                    <option value="1" ${savedRoot === '1' ? 'selected' : ''}>C#</option>
                                    <option value="0" ${savedRoot === '0' ? 'selected' : ''}>C</option>
                                </select>
                                <button onclick="applyChordProgression(document.getElementById('chord-input').value)"
                                    class="px-2 py-1 bg-blue-500 text-white rounded-md text-sm hover:bg-blue-600">適用</button>
                            </div>
                            <textarea id="chord-input" placeholder="例: C|G|Am|Em|F|C|F|G"
                                class="border rounded-md px-2 py-1 text-sm w-full h-16 resize-none">${savedInput}</textarea>
                        </div>
                        `;
                    }
                    trackContent.innerHTML = content;
                }
            });
        };

        // 初期化処理を実行
        const initializeDemo = () => {
            const pianoRollContainer = document.getElementById('piano-roll-container');
            const mmlOutput = document.getElementById('mml-output');
            noteLengthSelectEl = document.getElementById('note-length-select');

            // 0. MMLPlayer 初期化
            if (typeof window.MMLPlayer === 'undefined') {
                console.error("mml-player.jsが読み込まれていません。");
                return;
            }
            mmlPlayer = new window.MMLPlayer();

            // 2. Core/Renderer の初期化
            // 1. モジュールに Canvas の初期化を依頼 (DOM操作とイベントリスナーの抽象化)
            // ピアノロールコンテナの現在のサイズを使用
            const initWidth = pianoRollContainer.clientWidth || 800;
            const initHeight = pianoRollContainer.clientHeight || 450;
            DTM.init(
                pianoRollContainer.querySelector('#wrapper'),
                initWidth,
                initHeight,
                renderConfig,
            );

            tracks.forEach(track => {
                track.core = new DTM.MMLCore({
                    onMMLGenerated: (mml) => {
                        track.mml = mml;
                    },
                    onNotesChanged: (notes) => {
                        redrawAll();
                        updateUndoRedoButtons();
                    },
                }, track.volume);
            });

            const bpmInput = document.getElementById('bpm-input');
            if (bpmInput) {
                const updateTempo = () => {
                    const bpm = parseInt(bpmInput.value) || 120;
                    tracks.forEach(track => {
                        if (track.core) track.core.setTempo(bpm);
                    });
                };
                bpmInput.addEventListener('input', updateTempo);
                updateTempo();
            }

            // 3. イベントリスナーの設定 (ドラッグ/リサイズ/スクロールもここで)
            // NOTE: デモで必ず動作確認するため、UI操作はここに集約すること。
            const gridCanvas = DTM.getGridCanvas();
            const resizeHandleWidth = 6;
            let suppressClick = false;
            let isDblClick = false;
            let hasDragged = false;
            let dragState = null;

            const findActiveNoteAtPosition = (x, y) => {
                const activeTrack = tracks.find(t => t.id === activeTrackId);
                if (!activeTrack) return null;

                const { stepWidth, keyHeight, keyCount, pitchRangeStart } = renderConfig;
                const offset = DTM.getDrawOffset();

                for (const note of activeTrack.core.getNotes()) {
                    const logicalX = note.startStep * stepWidth;
                    const yIndex = keyCount - 1 - (note.pitch - pitchRangeStart);
                    const logicalY = yIndex * keyHeight;
                    const w = note.durationSteps * stepWidth;
                    const h = keyHeight;
                    const renderX = logicalX - offset.x;
                    const renderY = logicalY - offset.y;

                    if (x >= renderX && x <= renderX + w && y >= renderY && y <= renderY + h) {
                        return note;
                    }
                }

                return null;
            };

            gridCanvas.addEventListener('pointerdown', (event) => {
                event.preventDefault();
                const { x, y, step, pitch } = DTM.getGridPosition(event);

                // ツールモードに応じた処理
                if (activeToolMode === 'eraser') {
                    const note = findActiveNoteAtPosition(x, y);
                    if (note) {
                        const activeTrack = tracks.find(t => t.id === activeTrackId);
                        if (activeTrack) {
                            activeTrack.core.deleteNoteById(note.id);
                        }
                    }
                    return;
                }

                if (activeToolMode === 'select') {
                    // === 第1段階：既存の選択ノートをつかもうとしているかチェック ===
                    if (selectedNotes.length > 0) {
                        const clickedNote = findActiveNoteAtPosition(x, y);
                        if (clickedNote && selectedNotes.some(n => n.id === clickedNote.id)) {
                            // 選択ノートの上をクリック → 複数移動開始
                            selectedNotesOriginalPositions = selectedNotes.map(n => ({ id: n.id, startStep: n.startStep, pitch: n.pitch }));
                            isSelecting = true;
                            dragMode = 'move';
                            selectionStart = { x, y, step, pitch };
                            hasDragged = false;
                            return;
                        } else {
                            // 選択ノート以外の場所をクリック → 選択をクリア
                            selectedNotes = [];
                            selectionRect = null;
                        }
                    }

                    // === 第2段階：新規選択（枠or単一ノート） ===
                    const clickedNote = findActiveNoteAtPosition(x, y);
                    if (clickedNote) {
                        // 単一ノートをクリック → 移動開始
                        selectedNotes = [clickedNote];
                        selectedNotesOriginalPositions = [{ id: clickedNote.id, startStep: clickedNote.startStep, pitch: clickedNote.pitch }];
                        isSelecting = true;
                        dragMode = 'move';
                    } else {
                        // 空き領域をクリック → 新規枠選択開始
                        selectedNotes = [];
                        selectionRect = null;
                        isSelecting = true;
                        dragMode = 'rect';
                    }
                    selectionStart = { x, y, step, pitch };
                    hasDragged = false;
                    return;
                }

                if (activeToolMode === 'pen') {
                    hasDragged = false;
                    const activeTrack = tracks.find(t => t.id === activeTrackId);
                    if (!activeTrack) return;

                    // 浮動小数点誤差対策
                    const epsilon = 0.1;

                    // まず論理座標(step, pitch)でノートを検索
                    const existingNote = activeTrack.core.getNotes().find(n =>
                        n.pitch === pitch &&
                        step >= (n.startStep - epsilon) &&
                        step < (n.startStep + n.durationSteps - epsilon)
                    );

                    // A. ノートがあった場合：ドラッグ準備
                    if (existingNote) {
                        playPreviewNote(existingNote.pitch, existingNote.durationSteps);
                        const { stepWidth, keyHeight, keyCount, pitchRangeStart } = renderConfig;
                        const offset = DTM.getDrawOffset();
                        const renderX = existingNote.startStep * stepWidth - offset.x;
                        const w = existingNote.durationSteps * stepWidth;

                        // リサイズハンドル判定
                        if (x >= renderX + w - resizeHandleWidth && x <= renderX + w) {
                            dragState = {
                                noteId: existingNote.id,
                                mode: 'resize',
                                dragOffsetStep: 0,
                                dragOffsetPitch: 0,
                                startStep: existingNote.startStep,
                                durationSteps: existingNote.durationSteps,
                                lastPreviewPitch: existingNote.pitch,
                            };
                        } else {
                            // 移動準備
                            dragState = {
                                noteId: existingNote.id,
                                mode: 'move',
                                dragOffsetStep: step - existingNote.startStep,
                                dragOffsetPitch: pitch - existingNote.pitch,
                                startStep: existingNote.startStep,
                                durationSteps: existingNote.durationSteps,
                                lastPreviewPitch: existingNote.pitch,
                            };
                        }
                        suppressClick = true;
                        return;
                    }

                    // B. ノートがなかった場合：新規作成
                    const snappedStep = Math.floor(step / currentInsertLength) * currentInsertLength;
                    const newStart = snappedStep;
                    const newEnd = newStart + currentInsertLength;

                    const isOverlapping = activeTrack.core.getNotes().some(n => {
                        if (n.pitch !== pitch) return false;
                        return newStart < (n.startStep + n.durationSteps - epsilon) &&
                            newEnd > (n.startStep + epsilon);
                    });

                    if (!isOverlapping) {
                        activeTrack.core.addNote(snappedStep, pitch, { noteLengthSteps: currentInsertLength });
                        playPreviewNote(pitch, currentInsertLength);
                        redrawAll();

                        // 新規作成直後のドラッグ準備
                        const newNote = activeTrack.core.getNotes().find(n =>
                            Math.abs(n.startStep - snappedStep) < epsilon && n.pitch === pitch
                        );
                        if (newNote) {
                            dragState = {
                                noteId: newNote.id,
                                mode: 'move',
                                dragOffsetStep: 0,
                                dragOffsetPitch: 0,
                                startStep: newNote.startStep,
                                durationSteps: newNote.durationSteps,
                                lastPreviewPitch: newNote.pitch,
                            };
                            hasDragged = true;
                        }
                        suppressClick = true;
                    }
                }
            });


            const hasNoteAtPosition = (step, pitch, excludeNoteId = null) => {
                const activeTrack = tracks.find(t => t.id === activeTrackId);
                if (!activeTrack) return false;
                return activeTrack.core.getNotes().some(note =>
                    note.id !== excludeNoteId && note.pitch === pitch &&
                    step >= note.startStep && step < note.startStep + note.durationSteps
                );
            };

            document.addEventListener('pointermove', (event) => {
                if (activeToolMode === 'pen') {
                    const { x, y, step, pitch } = DTM.getGridPosition(event);
                    const activeTrack = tracks.find(t => t.id === activeTrackId);
                    if (!activeTrack) return;

                    if (!dragState) return;
                    hasDragged = true;

                    if (dragState.mode === 'move') {
                        const nextStart = step - dragState.dragOffsetStep;
                        const snappedStart = Math.round(nextStart / snapGridSteps) * snapGridSteps;
                        const nextPitch = pitch - dragState.dragOffsetPitch;
                        if (hasNoteAtPosition(snappedStart, nextPitch, dragState.noteId)) {
                            return;
                        }
                        activeTrack.core.moveNote(dragState.noteId, snappedStart, nextPitch);
                        if (nextPitch !== dragState.lastPreviewPitch) {
                            dragState.lastPreviewPitch = nextPitch;
                            playPreviewNote(nextPitch, dragState.durationSteps);
                        }
                        return;
                    }

                    const rawDuration = step - dragState.startStep + 1;
                    const snappedDuration = snapToGrid(rawDuration);
                    activeTrack.core.resizeNote(dragState.noteId, snappedDuration);
                    dragState.durationSteps = snappedDuration;
                    currentInsertLength = snappedDuration;
                    redrawAll();
                }
            });

            // ポインターmove: 選択枠更新 または 複数ノート平行移動
            document.addEventListener('pointermove', (event) => {
                if (activeToolMode === 'select' && isSelecting && selectionStart) {
                    const { x, y, step, pitch } = DTM.getGridPosition(event);

                    if (dragMode === 'rect') {
                        // --- 範囲選択モード ---
                        const minX = Math.min(x, selectionStart.x);
                        const minY = Math.min(y, selectionStart.y);
                        const width = Math.abs(x - selectionStart.x);
                        const height = Math.abs(y - selectionStart.y);
                        selectionRect = { x: minX, y: minY, width, height };

                        const activeTrack = tracks.find(t => t.id === activeTrackId);
                        if (activeTrack?.core) {
                            const notes = activeTrack.core.getNotes();
                            const { stepWidth, keyHeight, keyCount, pitchRangeStart } = renderConfig;
                            const offset = DTM.getDrawOffset();
                            selectedNotes = notes.filter(note => {
                                const logicalX = note.startStep * stepWidth;
                                const yIndex = keyCount - 1 - (note.pitch - pitchRangeStart);
                                const logicalY = yIndex * keyHeight;
                                const noteRect = {
                                    x: logicalX - offset.x,
                                    y: logicalY - offset.y,
                                    width: note.durationSteps * stepWidth,
                                    height: keyHeight,
                                };
                                return (
                                    selectionRect.x < noteRect.x + noteRect.width &&
                                    selectionRect.x + selectionRect.width > noteRect.x &&
                                    selectionRect.y < noteRect.y + noteRect.height &&
                                    selectionRect.y + selectionRect.height > noteRect.y
                                );
                            });
                        }
                        redrawAll();
                    } else if (dragMode === 'move') {
                        // --- 複数ノート平行移動モード ---
                        const rawDeltaStep = step - selectionStart.step;
                        const snappedDeltaStep = Math.round(rawDeltaStep / snapGridSteps) * snapGridSteps;
                        const deltaPitch = pitch - selectionStart.pitch;

                        if (snappedDeltaStep !== 0 || deltaPitch !== 0) {
                            hasDragged = true;
                            const activeTrack = tracks.find(t => t.id === activeTrackId);
                            if (activeTrack?.core) {
                                if (!activeTrack.core.isBatchOperation) {
                                    activeTrack.core.beginBatch();
                                }
                                selectedNotes.forEach(note => {
                                    const original = selectedNotesOriginalPositions.find(o => o.id === note.id);
                                    if (!original) return;

                                    const newStart = original.startStep + snappedDeltaStep;
                                    const newPitch = original.pitch + deltaPitch;

                                    if (newPitch >= 0 && newPitch < 128) {
                                        activeTrack.core.moveNote(note.id, newStart, newPitch);
                                    }
                                });
                            }
                        }
                        redrawAll();
                    }
                }
            });

            // ポインターup: ドラッグ終了 または 選択終了
            document.addEventListener('pointerup', () => {
                // ペン時のpointerup
                if (activeToolMode === 'pen') {
                    if (dragState) {
                        if (hasDragged) {
                            const activeTrack = tracks.find(t => t.id === activeTrackId);
                            if (activeTrack?.core) {
                                if (dragState.mode === 'move') {
                                    activeTrack.core.moveNoteEnd(dragState.noteId);
                                } else if (dragState.mode === 'resize') {
                                    activeTrack.core.resizeNoteEnd(dragState.noteId);
                                }
                            }
                            suppressClick = true;
                        }
                        dragState = null;
                    }
                    hasDragged = false;
                    isDblClick = false;
                }

                // 範囲選択時のpointerup
                if (activeToolMode === 'select' && isSelecting) {
                    // 複数ノート移動のバッチ処理を確定
                    if (hasDragged && dragMode === 'move' && selectedNotes.length > 0) {
                        const activeTrack = tracks.find(t => t.id === activeTrackId);
                        if (activeTrack?.core) {
                            activeTrack.core.endBatch();
                        }
                    }

                    isSelecting = false;
                    selectionStart = null;
                    hasDragged = false;

                    // dragMode='rect'の場合：selectedNotes は保持（次のクリックまで）
                    // dragMode='move'の場合：selectedNotes は保持
                    selectionRect = null; // 枠は消す
                    selectedNotesOriginalPositions = []; // 元位置は消す
                }
            });

            gridCanvas.addEventListener('wheel', (event) => {
                event.preventDefault();
                const maxOffsetY = getMaxOffsetY();
                currentOffsetY = clamp(currentOffsetY + event.deltaY, 0, maxOffsetY);
                currentOffsetX = Math.max(0, currentOffsetX + event.deltaX);
                DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                redrawAll();
            }, { passive: false });

            // ヘッダークリックで再生開始位置を設定
            const headerCanvas = DTM.getHeaderCanvas();
            headerCanvas.addEventListener('click', (event) => {
                if (isPlaying) return;
                const rect = headerCanvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const step = Math.floor((x + currentOffsetX) / renderConfig.stepWidth);
                const snappedStep = Math.floor(step / snapGridSteps) * snapGridSteps;

            const recordBtn = document.getElementById('record-button');
            recordBtn.classList.add('bg-red-500');

            const mergeData = () => {
                const ch = recordedData.length;
                const len = recordedData[0].length;
                if (len === 0) return new Float32Array(0);
                const bufSize = recordedData[0][0].length;
                const wave = new Float32Array(ch * len * bufSize);
                let idx = 0;
                for (let i = 0; i < len; i++) {
                    for (let j = 0; j < bufSize; j++) {
                        for (let k = 0; k < ch; k++) {
                            wave[idx++] = recordedData[k][i][j];
                        }
                    }
                }
                return wave;
            };

            const makeWAV = (wave) => {
                const sampleRate = audioCtx.sampleRate;
                const ch = 2;
                const bitRate = 16;
                const step = bitRate / 8;
                const blockSize = ch * step;
                const len = wave.length * step;
                const view = new DataView(new ArrayBuffer(44 + len));

                const writeStr = (offset, str) => {
                    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
                };

                writeStr(0, 'RIFF');
                view.setUint32(4, 32 + len, true);
                writeStr(8, 'WAVE');
                writeStr(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, ch, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * blockSize, true);
                view.setUint16(32, blockSize, true);
                view.setUint16(34, bitRate, true);
                writeStr(36, 'data');
                view.setUint32(40, len, true);

                const clamp = (num, min, max) => Math.max(min, Math.min(max, num));
                const float2int = (value, range) => clamp(Math.round(value * range), -range, range - 1);
                let offset = 44;
                for (let i = 0; i < wave.length; i++, offset += step) {
                    view.setInt16(offset, float2int(wave[i], 0x8000), true);
                }
                return view;
            };

            const wave = mergeData();
            const wav = makeWAV(wave);
            const blob = new Blob([wav], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'record.wav';
            a.click();
            URL.revokeObjectURL(url);
        };

        window.togglePlayback = () => {

                isPaused = false;

        window.pausePlayback = () => {

        const resumePlayback = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gainNode.gain.value = pausedGainValue;
            const bpmInput = document.getElementById('bpm-input');
            const bpm = parseInt(bpmInput?.value) || 120;
            timeline.length = 0;
            const secondsPerBeat = 60 / bpm;
            const stepsPerBeat = 48;
            const secondsPerStep = secondsPerBeat / stepsPerBeat;

            tracks.forEach((track, ch) => {
                const notes = track.core.getNotes();
                notes.forEach(note => {
                    const relativeStart = note.startStep - playStartStep;
                    if (relativeStart < 0) return;
                    timeline.push({
                        ch,
                        trackId: track.id,
                        pitch: note.pitch,
                        volume: track.volume / 100,
                        when: relativeStart * secondsPerStep,
                        duration: note.durationSteps * secondsPerStep,
                        trackVolume: track.volume / 100,
                        velocity: note.velocity ?? 127
                    });
                });
            });

            if (timeline.length === 0) return;

            timeline.sort((a, b) => a.when - b.when);
            const elapsedSeconds = (pausedPlayStep - playStartStep) * secondsPerStep;
            startTime = audioCtx.currentTime - elapsedSeconds;
            currentPlayStep = pausedPlayStep;
            nowIndex = 0;
            while (nowIndex < timeline.length && timeline[nowIndex].when < elapsedSeconds) {
                nowIndex++;
            }
            intervalId = setInterval(() => updatePlayback(secondsPerStep), 20);
            const animate = () => {
                if (!isPlaying) return;
                const time = audioCtx.currentTime - startTime;
                currentPlayStep = playStartStep + time / secondsPerStep;

                const gridCanvas = DTM.getGridCanvas();
                const visibleSteps = gridCanvas.width / renderConfig.stepWidth;
                const visibleBars = Math.round(visibleSteps / renderConfig.stepsPerBar);
                const scrollAmountPx = visibleBars * renderConfig.stepsPerBar * renderConfig.stepWidth;
                const threshold = currentOffsetX / renderConfig.stepWidth + visibleSteps - 4;
                if (currentPlayStep > threshold) {
                    currentOffsetX += scrollAmountPx;
                    DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                }

                redrawAll();
                drawPlayhead();
                animationId = requestAnimationFrame(animate);
            };
            animationId = requestAnimationFrame(animate);
        };

        const timeline = [];
        const planTime = 0.1;
        let startTime = 0;
        let nowIndex = 0;
        let intervalId = -1;
        let currentPlayStep = 0;
        let animationId = null;

        const stopPlayback = () => {
            clearInterval(intervalId);
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            currentPlayStep = 0;
            redrawAll();
        };

        const startPlayback = () => {
            stopPlayback();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!SoundFont) {
                console.error('SoundFont not loaded');
                return;
            }

            // 再生開始位置までスクロール
            const gridCanvas = DTM.getGridCanvas();
            const playStartX = playStartStep * renderConfig.stepWidth;
            const visibleWidth = gridCanvas.width * 0.5;
            currentOffsetX = Math.max(0, playStartX - visibleWidth);
            DTM.setDrawOffset(currentOffsetX, currentOffsetY);

            const bpmInput = document.getElementById('bpm-input');
            const bpm = parseInt(bpmInput?.value) || 120;
            timeline.length = 0;
            const secondsPerBeat = 60 / bpm;
            const stepsPerBeat = 48; // 48 steps per beat
            const secondsPerStep = secondsPerBeat / stepsPerBeat;

            tracks.forEach((track, ch) => {
                const notes = track.core.getNotes();
                notes.forEach(note => {
                    const relativeStart = note.startStep - playStartStep;
                    if (relativeStart < 0) return;
                    timeline.push({
                        ch,
                        trackId: track.id,
                        pitch: note.pitch,
                        volume: track.volume / 100,
                        when: relativeStart * secondsPerStep,
                        duration: note.durationSteps * secondsPerStep,
                        trackVolume: track.volume / 100,
                        velocity: note.velocity ?? 127
                    });
                });
            });

            if (timeline.length === 0) {
                console.log('No notes to play');
                return;
            }

            timeline.sort((a, b) => a.when - b.when);
            startTime = audioCtx.currentTime;
            nowIndex = 0;
            currentPlayStep = playStartStep;
            intervalId = setInterval(() => updatePlayback(secondsPerStep), 20);
            const animate = () => {
                if (!isPlaying) return;
                const time = audioCtx.currentTime - startTime;
                currentPlayStep = playStartStep + time / secondsPerStep;

                const gridCanvas = DTM.getGridCanvas();
                const visibleSteps = gridCanvas.width / renderConfig.stepWidth;
                const visibleBars = Math.round(visibleSteps / renderConfig.stepsPerBar);
                const scrollAmountPx = visibleBars * renderConfig.stepsPerBar * renderConfig.stepWidth;
                const threshold = currentOffsetX / renderConfig.stepWidth + visibleSteps - 4;
                if (currentPlayStep > threshold) {
                    currentOffsetX += scrollAmountPx;
                    DTM.setDrawOffset(currentOffsetX, currentOffsetY);
                }

                redrawAll();
                drawPlayhead();
                animationId = requestAnimationFrame(animate);
            };
            animationId = requestAnimationFrame(animate);
        };

        const drawPlayhead = () => {
            const gridCanvas = DTM.getGridCanvas();
            const ctx = DTM.getGridContext();
            if (!ctx) return;
            const x = currentPlayStep * renderConfig.stepWidth - currentOffsetX;
            if (x < 0 || x > gridCanvas.width) return;
            ctx.save();
            ctx.strokeStyle = '#EF4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, gridCanvas.height);
            ctx.stroke();
            ctx.restore();
        };

        const updatePlayback = (secondsPerStep) => {
            const time = audioCtx.currentTime - startTime;
            while (nowIndex < timeline.length) {
                const note = timeline[nowIndex];
                const { ch, pitch, when, duration, velocity, trackId } = note;
                if (isSolo && trackId && trackId !== activeTrackId) {
                    nowIndex++;
                    continue;
                }
                const currentTrack = tracks[ch];
                const trackVolume = currentTrack ? currentTrack.volume / 100 : 0.8;
                const velocityVolume = (velocity ?? 127) / 127;
                const volume = trackVolume * velocityVolume;
                const _trackId = currentTrack?.id || 'melody';
                const _when = when - time;
                if (_when > planTime) break;
                nowIndex++;
                if (_when < 0) {
                    playNote(_trackId, pitch, volume, 0, duration);
                    continue;
                }
                playNote(_trackId, pitch, volume, _when, duration);
            }

            if ((!isSolo || currentDrumPattern !== 'none') && SoundFont_drum.font) {
                const pattern = DRUM_PATTERNS[currentDrumPattern];
                if (pattern && pattern.length > 0) {
                    const stepsPerBar = renderConfig.stepsPerBar;
                    // 实际時間ベースのステップ計算（タブ非アクティブ対応）
                    const elapsedTime = audioCtx.currentTime - startTime;
                    const currentStep = (playStartStep * secondsPerStep + elapsedTime) / secondsPerStep;
                    const currentStepInBar = currentStep % stepsPerBar;
                    const nextStep = currentStepInBar + 4;

                    // 小節跨ぎの檢出
                    const crossedBar = currentStepInBar < 4;

                    pattern.forEach(drum => {
                        const drumStep = drum.step;
                        const shouldPlay = crossedBar && drumStep === 0 ||
                            (drumStep >= currentStepInBar && drumStep < nextStep);
                        if (shouldPlay) {
                            const whenSeconds = (drumStep - currentStepInBar) * secondsPerStep;
                            if (whenSeconds >= -0.1 && whenSeconds <= planTime) {
                                const noteDuration = 0.1;
                                const velocity = drum.velocity ?? 1.0;
                                if (whenSeconds < 0) {
                                    playDrumNote(drum.pitch, velocity, 0, noteDuration);
                                } else {
                                    playDrumNote(drum.pitch, velocity, whenSeconds, noteDuration);
                                }
                            }
                        }
                    });
                }
            }

            const lastNoteTime = timeline[timeline.length - 1]?.when ?? 0;
            const lastNoteDuration = timeline[timeline.length - 1]?.duration ?? 0;
            if (nowIndex >= timeline.length && time > lastNoteTime + lastNoteDuration + 0.1) {
                stopPlayback();
                isPlaying = false;
                updateControls();
            }
        };

        const noteLengthSelect = document.getElementById('note-length-select');

        const drumVolumeInput = document.getElementById('drum-volume-input');

        const drumRhythmSelect = document.getElementById('drum-rhythm-select');
        drumRhythmSelect.addEventListener('change', () => {

        const clearAllNotes = () => {
