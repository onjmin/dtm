<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/88383494" />
    <title>DTM Player (Embed)</title>
    <style>
        @font-face {
            font-family: 'k8x12';
            src: url('https://db.onlinewebfonts.com/t/777630d46640dc5a928ea833c2fcb875.woff2') format('woff2'),
                url('https://db.onlinewebfonts.com/t/777630d46640dc5a928ea833c2fcb875.woff') format('woff'),
                url('https://db.onlinewebfonts.com/t/777630d46640dc5a928ea833c2fcb875.ttf') format('truetype');
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff1e8;
            font-family: 'k8x12', ui-monospace, monospace;
            font-size: 14px;
            -webkit-font-smoothing: none;
            font-smooth: never;
        }

        /* 埋め込み枠いっぱいに使う。プレイヤーはコンテンツ高でそのまま伸びる */
        #player {
            padding: 6px;
        }

        /* 初期化中の表示 */
        #boot {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px;
            color: #83769c;
            letter-spacing: .1em;
            text-transform: uppercase;
            font-size: 12px;
        }

        #boot .spin {
            color: #29adff;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        #err {
            display: none;
            padding: 16px;
            color: #ff004d;
            font-size: 12px;
            line-height: 1.6;
        }

        /* 右下の控えめなクレジット（YouTubeロゴ相当） */
        .credit {
            display: block;
            text-align: right;
            padding: 2px 8px 6px;
            font-size: 10px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .credit a {
            color: #5f574f;
            text-decoration: none;
        }

        .credit a:hover {
            color: #29adff;
        }
    </style>
</head>

<body>
    <div id="boot"><span class="spin">█</span> LOADING PLAYER…</div>
    <div id="err"></div>
    <div id="player"></div>
    <div class="credit"><a href="https://github.com/onjmin/dtm" target="_blank" rel="noopener">♪ @onjmin/dtm</a></div>

    <script type="module">
        // ── URLペイロードの復号（demo/index.html のエンコードと対） ──
        // 形式: "g.<gzip+base64url>"（既定） / "u.<encodeURIComponent>"（フォールバック）
        const fromBase64Url = (s) => {
            let normalized = s.replace(/-/g, '+').replace(/_/g, '/');
            while (normalized.length % 4 !== 0) {
                normalized += '=';
            }
            const bin = atob(normalized);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return bytes;
        };
        const HIRAGANA_START = 0x3041;
        const PROLONGED_MARK = 0x30fc;
        const SHIFT_KATAKANA = 255;
        const VALUE_PROLONGED = 223;

        const customDecode = (bytes) => {
            let str = "";
            let i = 0;
            while (i < bytes.length) {
                const byte = bytes[i];
                if (byte <= 127) {
                    str += String.fromCharCode(byte);
                    i++;
                } else if (byte === VALUE_PROLONGED) {
                    str += String.fromCharCode(PROLONGED_MARK);
                    i++;
                } else if (byte >= 128 && byte <= 222) {
                    str += String.fromCharCode(HIRAGANA_START + (byte - 128));
                    i++;
                } else if (byte === SHIFT_KATAKANA) {
                    if (i + 1 < bytes.length) {
                        const nextByte = bytes[i + 1];
                        if (nextByte >= 128 && nextByte <= 222) {
                            str += String.fromCharCode(HIRAGANA_START + 0x60 + (nextByte - 128));
                        }
                        i += 2;
                    } else {
                        i++;
                    }
                } else {
                    i++;
                }
            }
            return str;
        };

        const gunzipCustom = async (bytes) => {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            writer.write(bytes);
            writer.close();
            const buf = await new Response(ds.readable).arrayBuffer();
            return customDecode(new Uint8Array(buf));
        };

        const gunzip = async (bytes) => {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            writer.write(bytes);
            writer.close();
            const buf = await new Response(ds.readable).arrayBuffer();
            return new TextDecoder().decode(buf);
        };


        const decodeMml = async (payload) => {
            if (!payload) return '';
            if (payload.startsWith('z.')) return await gunzipCustom(fromBase64Url(payload.slice(2)));
            if (payload.startsWith('g.')) return await gunzip(fromBase64Url(payload.slice(2)));
            if (payload.startsWith('u.')) return decodeURIComponent(payload.slice(2));
            // 旧形式（プレフィックス無し）は encodeURIComponent とみなす
            return decodeURIComponent(payload);
        };


        const bootEl = document.getElementById('boot');
        const errEl = document.getElementById('err');
        const playerEl = document.getElementById('player');

        const fail = (msg) => {
            bootEl.style.display = 'none';
            errEl.style.display = 'block';
            errEl.textContent = msg;
        };

        try {
            // 曲データは location.hash から受け取る（サーバに送られず、長さ制限も緩い）
            const payload = location.hash.slice(1);
            const mml = await decodeMml(payload);
            if (!mml) {
                fail('再生する曲データがURLにありません（#... が空です）。');
            } else {
                const isLocal = location.hostname === 'localhost';
                const DTM = await import(isLocal
                    ? 'http://localhost:40298/dist/index.mjs'
                    : './index.mjs');
                const { createDtmStudio } = DTM;

                // mountPlayer が #inst= から楽器プリセットを解決し、SoundFont・歌声を配線する
                const studio = await createDtmStudio();
                bootEl.style.display = 'none';
                studio.mountPlayer(playerEl, mml, { volume: 50 });
            }
        } catch (e) {
            fail('プレイヤーの初期化に失敗しました: ' + (e?.message ?? e));
            console.error(e);
        }
    </script>
</body>

</html>
