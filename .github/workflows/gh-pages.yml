name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-deploy:
    permissions:
      actions: write
      checks: write
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build docs
        run: pnpm exec rimraf docs && pnpm exec typedoc src/index.ts --out docs

      - name: Build package
        run: pnpm exec tsup

      - name: Copy demo files
        run: |
          mkdir -p docs/demo
          cp demo/index.html docs/demo/index.html
          cp demo/embed.html docs/demo/embed.html
          cp dist/index.mjs docs/demo/index.mjs
          cp dist/voice-worker.js docs/demo/voice-worker.js

      - name: Copy Discord Activity files
        run: |
          mkdir -p docs/demo/activity
          cp demo/activity/index.html docs/demo/activity/index.html
          cp demo/activity/collab.js docs/demo/activity/collab.js
          cp demo/activity/discord-sdk.js docs/demo/activity/discord-sdk.js
          VER="${GITHUB_SHA:0:8}"
          sed -i "s/__CI_HASH__/${VER}/g" docs/demo/activity/index.html
          sed -i "s/__CI_HASH__/${VER}/g" docs/demo/activity/collab.js
          sed -i "s/__DISCORD_CLIENT_ID__/${{ secrets.DISCORD_CLIENT_ID }}/g" docs/demo/activity/collab.js

      - name: Add .nojekyll
        run: touch ./docs/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
