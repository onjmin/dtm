name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # 1. ビルドジョブ：ファイルの生成とアップロードを行う
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build docs
        run: pnpm exec rimraf docs && pnpm exec typedoc src/index.ts --out docs

      - name: Build package
        run: pnpm exec tsup

      - name: Copy demo files
        run: |
          mkdir -p docs/demo
          cp demo/index.html docs/demo/index.html
          cp demo/embed.html docs/demo/embed.html
          cp demo/embed-chord.html docs/demo/embed-chord.html
          cp demo/bgm.html docs/demo/bgm.html
          cp dist/index.mjs docs/demo/index.mjs
          cp dist/voice-worker.js docs/demo/voice-worker.js

      - name: Add .nojekyll
        run: touch ./docs/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  # 2. デプロイジョブ：ビルド完了後にPagesへデプロイする
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write # デプロイに必須
      id-token: write # OIDC認証に必須
    runs-on: ubuntu-latest
    needs: build # buildジョブが成功した後に実行する
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # v5でエラーが出る場合は安定したv4に下げるのも手です（必要に応じて使い分けてください）
